name: Repair config CLI contract

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/repair-config-contract.yml'

permissions:
  contents: write

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler

      - name: Restore offline config summary behavior
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/codegen/xai-grok-pager/src/config_cmd.rs')
          text = path.read_text()
          old = '        None => crate::configure_wizard::run_wizard(),'
          new = '        None => run_model(None, false, false),'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected one config fallback occurrence, found {count}')
          path.write_text(text.replace(old, new))
          Path('.ci-config-contract-tail.txt').unlink(missing_ok=True)
          PY
          rustfmt --edition 2024 --config skip_children=true crates/codegen/xai-grok-pager/src/config_cmd.rs

      - name: Verify real config CLI subprocesses
        run: cargo test -p xai-grok-pager-bin --test config_cli_contract

      - name: Commit repair and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/repair-config-contract.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: restore offline dttn config summary'
          git push origin HEAD:${{ github.head_ref }}
