name: Format DTTN Config CLI Temp

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'feat/dttn-config-model-cli'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Format changed Rust files
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1
          mapfile -t changed_rust < <(
            git diff --name-only --diff-filter=ACM \
              "origin/${{ github.base_ref }}...HEAD" -- '*.rs'
          )
          if (( ${#changed_rust[@]} > 0 )); then
            rustfmt --edition 2024 "${changed_rust[@]}"
          fi
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -- "${changed_rust[@]}"
          git commit -m "style: format config CLI changes"
          git push origin "HEAD:refs/heads/${{ github.head_ref }}"
