name: Trigger DTTN session model snapshot implementation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  trigger-session-model-snapshot-implementation:
    if: github.head_ref == 'automation/implement-session-model-snapshot'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler

      - name: Extract implementation script
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/implement-session-model-snapshot.yml').read_text()
          anchor = '      - name: Apply Phase 5 implementation\n'
          run_marker = '        run: |\n'
          anchor_at = source.find(anchor)
          if anchor_at < 0:
              raise SystemExit('implementation workflow has no Apply Phase 5 implementation step')
          run_at = source.find(run_marker, anchor_at + len(anchor))
          if run_at < 0:
              raise SystemExit('implementation step has no run block')
          block = source[run_at + len(run_marker):]
          lines = []
          for line in block.splitlines():
              if line.startswith('          '):
                  lines.append(line[10:])
              elif not line.strip():
                  lines.append('')
              else:
                  raise SystemExit(f'unexpected implementation indentation: {line!r}')
          script = '\n'.join(lines) + '\n'
          ambiguous = (
              'replace_once(\n'
              '    spawn_path,\n'
              '    "    sampling_config: SamplingConfig,\\n",\n'
              '    "    mut sampling_config: SamplingConfig,\\n",\n'
              ')\n'
          )
          targeted = (
              'replace_once(\n'
              '    spawn_path,\n'
              '    \'\'\'pub(crate) async fn spawn_session_actor(\n'
              '    session_info: SessionInfo,\n'
              '    gateway: GatewaySender,\n'
              '    sampling_config: SamplingConfig,\n'
              '\'\'\',\n'
              '    \'\'\'pub(crate) async fn spawn_session_actor(\n'
              '    session_info: SessionInfo,\n'
              '    gateway: GatewaySender,\n'
              '    mut sampling_config: SamplingConfig,\n'
              '\'\'\',\n'
              ')\n'
          )
          if script.count(ambiguous) != 1:
              raise SystemExit(f'expected one ambiguous spawn patch, found {script.count(ambiguous)}')
          script = script.replace(ambiguous, targeted, 1)
          Path('/tmp/implement-session-model-snapshot.sh').write_text(script)
          PY

      - name: Run implementation and validation
        shell: bash
        env:
          FEATURE_BRANCH: refactor/dttn-session-model-snapshot-phase-5
          EXPECTED_HEAD: 67c4964dac9732613f362fc639177ed3bea9ac7b
        run: |
          set +e
          bash /tmp/implement-session-model-snapshot.sh > /tmp/implementation.log 2>&1
          status=$?
          echo "$status" > /tmp/implementation.status
          if [ "$status" -ne 0 ]; then
            echo "Phase 5 implementation failed with status $status"
            exit "$status"
          fi
          tail -n 60 /tmp/implementation.log

      - name: Upload implementation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase5-session-snapshot-implementation-${{ github.run_attempt }}
          path: |
            /tmp/implementation.log
            /tmp/implementation.status
          if-no-files-found: warn
          retention-days: 7
