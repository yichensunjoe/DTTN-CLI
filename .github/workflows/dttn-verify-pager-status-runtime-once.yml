name: DTTN Verify Pager Status Runtime Once

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/dttn-verify-pager-status-runtime-once.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Require pager product commit
        run: git log --format=%s -n 80 | grep -Fqx 'feat: wire status runtime into pager status bar'

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler

      - name: Validate formatting
        run: cargo fmt --check

      - name: Test shell status runtime contract
        run: cargo test -p xai-grok-shell --test status_runtime_snapshot_contract

      - name: Test pager status runtime
        run: cargo test -p xai-grok-pager status_runtime

      - name: Test pager status bar
        run: cargo test -p xai-grok-pager status_bar

      - name: Test proto build helper
        run: cargo test -p xai-proto-build

      - name: Check production dttn binary
        run: cargo check -p xai-grok-pager-bin --bin dttn

      - name: Validate whitespace
        run: git diff --check

      - name: Update pull request description
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          cat > /tmp/pr-body.md <<'BODY'
          ## Summary

          Add the production Phase 6 status-runtime pipeline from session-owned immutable snapshots through ACP wire notifications into the Pager status bar.

          ## Runtime and wire changes

          - publish immutable `StatusRuntimeSnapshot` generations behind a short serialized write critical section
          - keep the model contract session-frozen across restore and explicit model switching
          - publish turn lifecycle, token usage, trusted cost, latency, tool activity, and pending interactions
          - expose stable `StatusRuntimeWireSnapshot` and `StatusRuntimeNotification` DTOs
          - use a coalescing `tokio::sync::watch` channel so late subscribers receive the current generation and slow subscribers converge on the latest revision
          - include an optional status snapshot in `x.ai/session/info`
          - send live `x.ai/status_runtime` notifications without blocking the Agent loop
          - exclude prompt ownership tokens, internal locks, `Arc`, tool guards, backend-tool maps, and credentials from the wire contract

          ## Pager changes

          - initialize local status from `session/info`
          - accept only strictly newer live revisions and ignore stale or duplicate notifications
          - keep status entirely in Pager memory for local, Leader, and remote modes
          - render wide, medium, and narrow layouts with Unicode-safe truncation
          - show model, run state, live context use, session tokens, trusted cost, TTFT/request latency, tool activity, and pending interaction state when width permits
          - omit unknown or untrusted cost instead of displaying `$0`
          - keep context percentage sourced from Pager's live context state rather than cumulative session history
          - keep the render path synchronous and I/O-free

          ## Validation

          - `cargo fmt --check`
          - `cargo test -p xai-grok-shell --test status_runtime_snapshot_contract`
          - `cargo test -p xai-grok-pager status_runtime`
          - `cargo test -p xai-grok-pager status_bar`
          - `cargo test -p xai-proto-build`
          - `cargo check -p xai-grok-pager-bin --bin dttn`
          - `git diff --check`
          - dedicated Phase 6 CI on Ubuntu, macOS, and Windows

          ## Scope boundaries

          Provider balance queries, provider-native adapters, automatic model discovery, Git status scanning, network probing, multi-Agent refactors, and dashboard work remain out of scope. Provider balance must later be implemented as a background adapter that pre-publishes trusted data into the status snapshot; renderers must never query providers directly.

          This pull request remains Draft and is not authorized for merge.
          BODY
          gh api "repos/${GH_REPO}/pulls/${PR_NUMBER}" --method PATCH --raw-field body="$(cat /tmp/pr-body.md)"

      - name: Record verification result
        if: success()
        run: echo VERIFIED > /tmp/pager-status-runtime-result

      - name: Remove all one-time pager workflows
        if: always()
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git rm -f --ignore-unmatch \
            .github/workflows/dttn-apply-pager-status-runtime-once.yml \
            .github/workflows/dttn-cleanup-pager-status-runtime-once.yml \
            .github/workflows/dttn-recover-pager-status-runtime-once.yml \
            .github/workflows/dttn-finalize-pager-status-runtime-once.yml \
            .github/workflows/dttn-verify-pager-status-runtime-once.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git diff --cached --check
          git commit -m 'chore: remove pager status runtime staging workflows'
          git push origin "HEAD:${HEAD_BRANCH}"
