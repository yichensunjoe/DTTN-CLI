name: DTTN Phase 6 Status Runtime

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/dttn-phase-6-status-runtime.yml'
      - 'crates/codegen/xai-grok-shell/src/session/**'
      - 'crates/codegen/xai-grok-shell/tests/status_runtime_snapshot_contract.rs'
      - 'crates/codegen/xai-grok-pager/**'

concurrency:
  group: dttn-phase-6-status-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  source-snapshot:
    name: Export current Phase 6 source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Collect current source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p phase-6-current/shell phase-6-current/pager
          cp -R crates/codegen/xai-grok-shell/src/session phase-6-current/shell/session
          cp crates/codegen/xai-grok-shell/tests/status_runtime_snapshot_contract.rs \
            phase-6-current/shell/status_runtime_snapshot_contract.rs
          cp -R crates/codegen/xai-grok-pager/src phase-6-current/pager/src
          if [ -d crates/codegen/xai-grok-pager/tests ]; then
            cp -R crates/codegen/xai-grok-pager/tests phase-6-current/pager/tests
          fi

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: phase-6-current-source
          path: phase-6-current
          if-no-files-found: error
