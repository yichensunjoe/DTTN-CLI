name: DTTN Phase 6 Status Runtime

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/dttn-phase-6-status-runtime.yml'
      - 'Cargo.lock'
      - 'crates/build/xai-proto-build/**'
      - 'crates/codegen/xai-grok-shell/src/session/**'
      - 'crates/codegen/xai-grok-shell/tests/status_runtime_snapshot_contract.rs'
      - 'crates/codegen/xai-grok-pager/**'
      - 'crates/codegen/xai-grok-pager-bin/**'

concurrency:
  group: dttn-phase-6-status-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  proto-rustfmt:
    name: Proto rustfmt diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Format proto build helper
        run: rustfmt --edition 2024 --config skip_children=true crates/build/xai-proto-build/src/lib.rs

      - name: Upload formatted proto helper
        uses: actions/upload-artifact@v4
        with:
          name: phase-6-proto-rustfmt
          path: crates/build/xai-proto-build/src/lib.rs
          if-no-files-found: error
