name: DTTN Phase 4 Model Catalog Validation

on:
  pull_request:
    branches:
      - refactor/dttn-model-provider-phase-3

concurrency:
  group: dttn-phase4-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-model-catalog:
    if: github.head_ref == 'refactor/dttn-model-catalog-status-phase-4'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler

      - name: Validate model catalog and telemetry contracts
        shell: bash
        run: |
          set -o pipefail
          {
            git fetch origin "${{ github.base_ref }}" --depth=1
            mapfile -t changed_rust < <(
              git diff --name-only --diff-filter=ACM \
                "origin/${{ github.base_ref }}...HEAD" -- '*.rs'
            )
            if (( ${#changed_rust[@]} > 0 )); then
              rustfmt --edition 2024 --check "${changed_rust[@]}"
            fi
            cargo test -p xai-grok-sampling-types
            cargo test -p xai-grok-shell model_catalog_runtime::tests --lib
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          } 2>&1 | tee phase4-validation.log

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dttn-phase4-model-catalog-diagnostics
          path: phase4-validation.log
          if-no-files-found: warn
          retention-days: 7
