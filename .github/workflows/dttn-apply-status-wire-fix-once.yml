name: DTTN Apply Status Wire Fix Once

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/dttn-apply-status-wire-fix-once.yml'

permissions:
  contents: write

jobs:
  apply-status-wire-fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: phase-6-wire-fix-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            phase-6-wire-${{ runner.os }}-

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler

      - name: Apply status wire implementation and compile fixes
        shell: bash
        run: |
          set -euo pipefail
          awk '
            /^          H4sI/ { capture = 1 }
            capture && /^          PATCH$/ { exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/dttn-apply-status-wire-once.yml > /tmp/status-wire.patch.gz.b64
          base64 --decode /tmp/status-wire.patch.gz.b64 | gunzip > /tmp/status-wire.patch
          git apply --check /tmp/status-wire.patch
          git apply /tmp/status-wire.patch

          python - <<'PY'
          from pathlib import Path

          pending = Path('crates/codegen/xai-grok-shell/src/session/pending_interaction.rs')
          source = pending.read_text()
          old = '''        Ok(params) => gateway.forward_fire_and_forget(acp::ExtNotification::new(
                      STATUS_RUNTIME_NOTIFICATION_METHOD,
                      params.into(),
                  )),'''
          new = '''        Ok(params) => {
                      gateway.forward_fire_and_forget(acp::ExtNotification::new(
                          STATUS_RUNTIME_NOTIFICATION_METHOD,
                          params.into(),
                      ));
                  }'''
          if source.count(old) != 1:
              raise SystemExit('status notification match anchor changed')
          pending.write_text(source.replace(old, new))

          handler = Path('crates/codegen/xai-grok-shell/src/agent/handlers/session.rs')
          source = handler.read_text()
          old = '''        turns: 0,
                  turn_index: 0,'''
          new = '''        turns: 0,
                  status_runtime: None,
                  turn_index: 0,'''
          if source.count(old) != 1:
              raise SystemExit('session info fallback anchor changed')
          handler.write_text(source.replace(old, new))
          PY

          rustfmt --edition 2024 --config skip_children=true \
            crates/codegen/xai-grok-shell/src/session/status_runtime_snapshot.rs \
            crates/codegen/xai-grok-shell/src/session/acp_types.rs \
            crates/codegen/xai-grok-shell/src/session/pending_interaction.rs \
            crates/codegen/xai-grok-shell/src/session/acp_session_impl/session_setup.rs \
            crates/codegen/xai-grok-shell/src/agent/handlers/session.rs \
            crates/codegen/xai-grok-shell/tests/status_runtime_snapshot_contract.rs

      - name: Test status runtime contract
        id: contract
        continue-on-error: true
        shell: bash
        env:
          CARGO_TERM_COLOR: never
        run: |
          cargo test -p xai-grok-shell --test status_runtime_snapshot_contract > status-wire-fix.log 2>&1

      - name: Upload failure diagnostics
        if: steps.contract.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: status-wire-fix-log
          path: status-wire-fix.log
          if-no-files-found: error

      - name: Enforce contract result
        if: steps.contract.outcome != 'success'
        run: |
          tail -n 300 status-wire-fix.log
          exit 1

      - name: Test proto build helper
        run: cargo test -p xai-proto-build

      - name: Check production dttn binary
        run: cargo check -p xai-grok-pager-bin --bin dttn

      - name: Validate whitespace
        run: git diff --check

      - name: Commit validated implementation
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            crates/codegen/xai-grok-shell/src/session/status_runtime_snapshot.rs \
            crates/codegen/xai-grok-shell/src/session/acp_types.rs \
            crates/codegen/xai-grok-shell/src/session/pending_interaction.rs \
            crates/codegen/xai-grok-shell/src/session/acp_session_impl/session_setup.rs \
            crates/codegen/xai-grok-shell/src/agent/handlers/session.rs \
            crates/codegen/xai-grok-shell/tests/status_runtime_snapshot_contract.rs
          git diff --cached --check
          git commit -m 'feat: add status runtime wire snapshots and notifications'
          git push origin "HEAD:${HEAD_BRANCH}"
