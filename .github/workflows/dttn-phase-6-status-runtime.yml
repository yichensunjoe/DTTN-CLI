name: DTTN Phase 6 Status Runtime

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/dttn-phase-6-status-runtime.yml'
      - 'Cargo.lock'
      - 'crates/codegen/xai-grok-shell/src/session/**'
      - 'crates/codegen/xai-grok-shell/tests/status_runtime_snapshot_contract.rs'
      - 'crates/codegen/xai-grok-pager/**'
      - 'crates/codegen/xai-grok-pager-bin/**'

concurrency:
  group: dttn-phase-6-status-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  snapshot-contract:
    name: Snapshot contract (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install protoc --no-progress -y

      - name: Test status runtime contract
        run: cargo test -p xai-grok-shell --test status_runtime_snapshot_contract

  renderer-wiring:
    name: Renderer wiring and formatting
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler

      - name: Format changed Rust for diagnostics
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1
          mapfile -t changed_rust < <(
            git diff --name-only --diff-filter=ACM \
              "origin/${{ github.base_ref }}...HEAD" -- '*.rs'
          )
          if (( ${#changed_rust[@]} > 0 )); then
            rustfmt --edition 2024 --config skip_children=true "${changed_rust[@]}"
          fi

      - name: Upload formatted status files
        uses: actions/upload-artifact@v4
        with:
          name: phase-6-rustfmt
          path: |
            crates/codegen/xai-grok-shell/src/session/status_runtime_snapshot.rs
            crates/codegen/xai-grok-shell/src/session/acp_session_impl/tasks_cancel.rs
            crates/codegen/xai-grok-shell/tests/status_runtime_snapshot_contract.rs
          if-no-files-found: error

      - name: Check production dttn binary
        run: cargo check -p xai-grok-pager-bin --bin dttn

      - name: Validate patch whitespace
        shell: bash
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"
