name: Update release lockfile

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Regenerate Cargo lockfile metadata
        shell: bash
        run: |
          set -euo pipefail
          cargo check -p xai-grok-version
          python3 - <<'PY'
          from pathlib import Path
          text = Path('Cargo.lock').read_text()
          block = text.split('name = "xai-grok-pager-bin"', 1)[1].split('[[package]]', 1)[0]
          assert 'version = "0.1.220-alpha.5"' in block, block
          PY
          if git diff --quiet -- Cargo.lock; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Cargo.lock
          git diff --cached --check
          git commit -m 'chore: update lockfile for alpha.5'
          git push origin HEAD:${{ github.head_ref }}
