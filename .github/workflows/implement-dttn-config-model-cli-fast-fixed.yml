name: Implement DTTN config model CLI fast fixed

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  implement-config-cli-fast-fixed:
    if: github.head_ref == 'automation/implement-dttn-config-model-cli'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Apply validated config CLI patch
        shell: bash
        env:
          FEATURE_BRANCH: feat/dttn-config-model-cli
        run: |
          set -euo pipefail
          cp .github/workflows/implement-dttn-config-model-cli.yml /tmp/implementation.yml
          git fetch origin "$FEATURE_BRANCH"
          git checkout -B "$FEATURE_BRANCH" "origin/$FEATURE_BRANCH"
          python3 - <<'PY'
          from pathlib import Path
          text = Path('/tmp/implementation.yml').read_text()
          marker = "          python3 - <<'PY'\n"
          start = text.index(marker) + len(marker)
          end = text.index("\n          PY\n", start)
          lines = text[start:end].splitlines()
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in lines)
          Path('/tmp/apply_config_cli.py').write_text(script + "\n")
          PY
          python3 /tmp/apply_config_cli.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/codegen/xai-grok-pager-bin/tests/config_cli_contract.rs')
          text = path.read_text()
          old = '    assert!(stdout.contains("dttn"));\n'
          new = '    assert!(stdout.contains("config"));\n'
          if text.count(old) != 1:
              raise SystemExit('expected one help identity assertion')
          path.write_text(text.replace(old, new, 1))
          PY

          rustfmt --edition 2024 \
            crates/codegen/xai-grok-config/src/user_config.rs \
            crates/codegen/xai-grok-config/src/lib.rs \
            crates/codegen/xai-grok-pager/src/config_cmd.rs \
            crates/codegen/xai-grok-pager/src/lib.rs \
            crates/codegen/xai-grok-pager/src/app/cli.rs \
            crates/codegen/xai-grok-pager-bin/src/main.rs \
            crates/codegen/xai-grok-pager-bin/tests/config_cli_contract.rs
          cargo test -p xai-grok-config user_config::tests
          git diff --check

          git add \
            crates/codegen/xai-grok-config/Cargo.toml \
            crates/codegen/xai-grok-config/src/lib.rs \
            crates/codegen/xai-grok-config/src/user_config.rs \
            crates/codegen/xai-grok-pager/src/lib.rs \
            crates/codegen/xai-grok-pager/src/config_cmd.rs \
            crates/codegen/xai-grok-pager/src/app/cli.rs \
            crates/codegen/xai-grok-pager-bin/src/main.rs \
            crates/codegen/xai-grok-pager-bin/tests/config_cli_contract.rs \
            Cargo.lock
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "feat: add offline dttn config model command"
          git push origin "HEAD:refs/heads/$FEATURE_BRANCH"
