name: DTTN Phase 6 Status Runtime

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/dttn-phase-6-status-runtime.yml'
      - 'crates/codegen/xai-grok-shell/src/session/**'
      - 'crates/codegen/xai-file-utils/src/events/**'

concurrency:
  group: dttn-phase-6-status-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tool-activity-diagnostic:
    name: Tool activity diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Locate tool lifecycle boundaries
        shell: bash
        run: |
          set -euo pipefail
          grep -R -n -C 8 --include='*.rs' \
            -E 'tool_started\(|tool_finished\(|cancel_active_tool\(' \
            crates > tool-activity-callsites.txt
          cat tool-activity-callsites.txt

      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: phase-6-tool-activity-diagnostic
          path: tool-activity-callsites.txt
          if-no-files-found: error
