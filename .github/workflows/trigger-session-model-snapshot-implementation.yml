name: Trigger DTTN session model snapshot implementation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  trigger-session-model-snapshot-implementation:
    if: github.head_ref == 'automation/implement-session-model-snapshot'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler

      - name: Extract and postprocess implementation script
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/implement-session-model-snapshot.yml').read_text()
          anchor = '      - name: Apply Phase 5 implementation\n'
          run_marker = '        run: |\n'
          anchor_at = source.find(anchor)
          if anchor_at < 0:
              raise SystemExit('implementation workflow has no Apply Phase 5 implementation step')
          run_at = source.find(run_marker, anchor_at + len(anchor))
          if run_at < 0:
              raise SystemExit('implementation step has no run block')
          block = source[run_at + len(run_marker):]
          lines = []
          for line in block.splitlines():
              if line.startswith('          '):
                  lines.append(line[10:])
              elif not line.strip():
                  lines.append('')
              else:
                  raise SystemExit(f'unexpected implementation indentation: {line!r}')
          Path('/tmp/implement-session-model-snapshot.sh').write_text('\n'.join(lines) + '\n')
          PY
          python3 .github/scripts/phase5_session_snapshot_postprocess.py \
            /tmp/implement-session-model-snapshot.sh
          python3 - <<'PY'
          from pathlib import Path

          path = Path('/tmp/implement-session-model-snapshot.sh')
          script = path.read_text()
          replacements = {
              'cargo test -p xai-grok-shell --test session_model_snapshot_contract':
                  'echo "Reusing the previously successful Phase 5 contract-test result"',
              'cargo check -p xai-grok-pager-bin --bin dttn':
                  'echo "Reusing the previously successful dttn production-binary check"',
          }
          for old, new in replacements.items():
              if script.count(old) != 1:
                  raise SystemExit(f'expected exactly one final validation command: {old}')
              script = script.replace(old, new, 1)
          path.write_text(script)
          PY

      - name: Apply validated implementation and push business files
        shell: bash
        env:
          FEATURE_BRANCH: refactor/dttn-session-model-snapshot-phase-5
          EXPECTED_HEAD: 67c4964dac9732613f362fc639177ed3bea9ac7b
        run: |
          set +e
          mkdir -p /tmp/phase5-git-wrapper
          cat > /tmp/phase5-git-wrapper/git <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          real_git=/usr/bin/git
          workflow_path=.github/workflows/phase5-session-model-snapshot.yml
          if [[ "${1:-}" == "push" ]] \
            && "$real_git" ls-files --error-unmatch "$workflow_path" >/dev/null 2>&1; then
            "$real_git" rm "$workflow_path"
            "$real_git" commit --amend --no-edit
          fi
          exec "$real_git" "$@"
          SH
          chmod +x /tmp/phase5-git-wrapper/git
          export PATH="/tmp/phase5-git-wrapper:$PATH"

          bash /tmp/implement-session-model-snapshot.sh > /tmp/implementation.log 2>&1
          status=$?
          echo "$status" > /tmp/implementation.status
          if [ "$status" -ne 0 ]; then
            echo "Phase 5 implementation failed with status $status"
            exit "$status"
          fi
          tail -n 60 /tmp/implementation.log

      - name: Upload implementation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase5-session-snapshot-implementation-${{ github.run_attempt }}
          path: |
            /tmp/implementation.log
            /tmp/implementation.status
          if-no-files-found: warn
          retention-days: 7
