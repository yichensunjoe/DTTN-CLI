name: DTTN Phase 3 Validation

on:
  pull_request:
    branches:
      - refactor/dttn-core-phase-1

concurrency:
  group: dttn-phase3-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-provider-layer:
    if: github.head_ref == 'refactor/dttn-model-provider-phase-3'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler

      - name: Wire model doctor entrypoint
        shell: bash
        run: python scripts/apply_dttn_model_doctor_entrypoint.py

      - name: Validate provider compatibility layer
        shell: bash
        run: |
          set -o pipefail
          {
            git fetch origin "${{ github.base_ref }}" --depth=1
            mapfile -t changed_rust < <(
              git diff --name-only --diff-filter=ACM \
                "origin/${{ github.base_ref }}...HEAD" -- '*.rs'
            )
            if (( ${#changed_rust[@]} > 0 )); then
              rustfmt --edition 2024 "${changed_rust[@]}"
            fi
            cargo test -p xai-grok-sampling-types
            cargo test -p xai-grok-sampler
            cargo test -p xai-grok-sampler --test provider_extensions
            cargo check -p xai-grok-shell
            cargo check -p xai-grok-pager-bin --bin dttn
            git diff --check
          } 2>&1 | tee phase3-validation.log

      - name: Commit generated entrypoint
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Model doctor entrypoint already committed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/codegen
          git commit -m "feat: wire dttn model doctor command"
          git push origin HEAD:${{ github.head_ref }}

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dttn-phase3-validation-diagnostics
          path: phase3-validation.log
          if-no-files-found: warn
          retention-days: 7
