name: DTTN Phase 6 Status Runtime

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/dttn-phase-6-status-runtime.yml'
      - 'crates/codegen/xai-grok-shell/src/session/**'

concurrency:
  group: dttn-phase-6-status-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pending-interaction-diagnostic:
    name: Pending interaction diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Format pending interaction module
        run: rustfmt --edition 2024 --config skip_children=true crates/codegen/xai-grok-shell/src/session/pending_interaction.rs

      - name: Locate guard construction sites
        shell: bash
        run: |
          grep -R -n --include='*.rs' 'PendingInteractionGuard::new' crates > pending-interaction-callsites.txt
          cat pending-interaction-callsites.txt

      - name: Upload integration diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: phase-6-pending-interaction-diagnostic
          path: |
            crates/codegen/xai-grok-shell/src/session/pending_interaction.rs
            pending-interaction-callsites.txt
          if-no-files-found: error
