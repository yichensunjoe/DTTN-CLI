name: DTTN Phase 3 Migration

on:
  pull_request:
    branches:
      - refactor/dttn-core-phase-1

permissions:
  contents: read

jobs:
  migrate-provider-layer:
    if: >-
      github.head_ref == 'refactor/dttn-model-provider-phase-3' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler

      - name: Apply deterministic migration
        shell: bash
        run: |
          set -o pipefail
          python scripts/apply_dttn_phase3_fixed.py 2>&1 | tee phase3-migration.log

      - name: Format and validate provider layer
        shell: bash
        run: |
          set -o pipefail
          {
            cargo fmt --all -- --check
            cargo test -p xai-grok-sampling-types
            cargo test -p xai-grok-sampler
            cargo check -p xai-grok-shell
            git diff --check
          } 2>&1 | tee phase3-validation.log

      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dttn-phase3-migration-diagnostics
          path: |
            phase3-migration.log
            phase3-validation.log
          if-no-files-found: warn
          retention-days: 7

      - name: Commit migration result
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Phase 3 migration produced no changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/codegen
          git commit -m "refactor: separate standard and xAI provider extensions"
          git push origin HEAD:${{ github.head_ref }}
