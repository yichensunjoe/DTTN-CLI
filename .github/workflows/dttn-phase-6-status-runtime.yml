name: DTTN Phase 6 Status Runtime

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/dttn-phase-6-status-runtime.yml'
      - 'crates/codegen/xai-grok-shell/src/session/**'

concurrency:
  group: dttn-phase-6-status-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply-pending-interaction-patch:
    name: Apply pending interaction integration
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply verified integration patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          tool_calls = Path('crates/codegen/xai-grok-shell/src/session/acp_session_impl/tool_calls.rs')
          text = tool_calls.read_text()
          if text.count('self.status_runtime.clone(),') < 2:
              pattern = re.compile(
                  r'(PendingInteractionGuard::new\(\n(?P<indent>\s*)self\.pending_interactions\.clone\(\),\n)'
                  r'(?P=indent)self\.notifications\.gateway\.clone\(\),'
              )
              def add_self_status(match):
                  indent = match.group('indent')
                  return (
                      match.group(1)
                      + indent + 'self.status_runtime.clone(),\n'
                      + indent + 'self.notifications.gateway.clone(),'
                  )
              text, count = pattern.subn(add_self_status, text)
              if count != 2:
                  raise SystemExit(f'tool_calls guard replacement count={count}, expected 2')
              tool_calls.write_text(text)
          elif text.count('self.status_runtime.clone(),') != 2:
              raise SystemExit('unexpected self.status_runtime argument count')

          spawn = Path('crates/codegen/xai-grok-shell/src/session/acp_session_impl/spawn.rs')
          text = spawn.read_text()
          if 'let status_runtime = session.status_runtime.clone();' not in text:
              text, clone_count = re.subn(
                  r'(?m)^(?P<indent>\s*)let pending_interactions = session\.pending_interactions\.clone\(\);$',
                  lambda m: (
                      m.group(0) + '\n' + m.group('indent')
                      + 'let status_runtime = session.status_runtime.clone();'
                  ),
                  text,
                  count=1,
              )
              if clone_count != 1:
                  raise SystemExit(f'spawn status clone replacement count={clone_count}, expected 1')

              pattern = re.compile(
                  r'(PendingInteractionGuard::new\(\n(?P<indent>\s*)pending_interactions\.clone\(\),\n)'
                  r'(?P=indent)gateway\.clone\(\),'
              )
              def add_spawn_status(match):
                  indent = match.group('indent')
                  return (
                      match.group(1)
                      + indent + 'status_runtime.clone(),\n'
                      + indent + 'gateway.clone(),'
                  )
              text, guard_count = pattern.subn(add_spawn_status, text)
              if guard_count != 1:
                  raise SystemExit(f'spawn question guard replacement count={guard_count}, expected 1')
              spawn.write_text(text)
          elif text.count('status_runtime.clone(),') < 1:
              raise SystemExit('spawn status clone exists without guard argument')
          PY

          rustfmt --edition 2024 --config skip_children=true \
            crates/codegen/xai-grok-shell/src/session/pending_interaction.rs \
            crates/codegen/xai-grok-shell/src/session/acp_session_impl/tool_calls.rs \
            crates/codegen/xai-grok-shell/src/session/acp_session_impl/spawn.rs
          git diff --check

      - name: Commit integration files
        shell: bash
        run: |
          if git diff --quiet -- \
            crates/codegen/xai-grok-shell/src/session/pending_interaction.rs \
            crates/codegen/xai-grok-shell/src/session/acp_session_impl/tool_calls.rs \
            crates/codegen/xai-grok-shell/src/session/acp_session_impl/spawn.rs; then
            echo 'Integration files already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            crates/codegen/xai-grok-shell/src/session/pending_interaction.rs \
            crates/codegen/xai-grok-shell/src/session/acp_session_impl/tool_calls.rs \
            crates/codegen/xai-grok-shell/src/session/acp_session_impl/spawn.rs
          git commit -m 'feat: wire pending interaction status publications'
          git push origin HEAD:${{ github.head_ref }}
