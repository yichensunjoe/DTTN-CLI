name: DTTN Phase 6 Status Runtime

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/dttn-phase-6-status-runtime.yml'
      - 'Cargo.lock'
      - 'crates/build/xai-proto-build/**'
      - 'crates/codegen/xai-grok-shell/src/session/**'
      - 'crates/codegen/xai-grok-shell/tests/status_runtime_snapshot_contract.rs'
      - 'crates/codegen/xai-grok-pager/**'
      - 'crates/codegen/xai-grok-pager-bin/**'

concurrency:
  group: dttn-phase-6-status-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply-wire-bridge:
    name: Apply validated status wire bridge
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: phase-6-wire-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler

      - name: Apply status wire projection and bridge
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          status_path = Path('crates/codegen/xai-grok-shell/src/session/status_runtime_snapshot.rs')
          source = status_path.read_text()
          if 'STATUS_RUNTIME_NOTIFICATION_METHOD' not in source:
              old = '#[derive(Debug, Clone, Copy, Default, PartialEq, Eq)]\npub enum StatusRunState {'
              new = '#[derive(Debug, Clone, Copy, Default, PartialEq, Eq, serde::Serialize, serde::Deserialize)]\n#[serde(rename_all = "snake_case")]\npub enum StatusRunState {'
              if source.count(old) != 1:
                  raise SystemExit('StatusRunState derive anchor changed')
              source = source.replace(old, new)

              anchor = '''impl StatusRuntimeSnapshot {
              pub fn from_session_model(snapshot: &ResolvedSessionModelSnapshot) -> Self {
                  Self {
                      model: StatusModelContract::from(snapshot),
                      ..Self::default()
                  }
              }
          }
          '''
              wire = '''
          pub const STATUS_RUNTIME_NOTIFICATION_METHOD: &str = "x.ai/status_runtime";

          /// Stable, transport-safe projection of the private runtime snapshot.
          ///
          /// The active prompt ownership token and private backend-tool tracker never
          /// cross this boundary. New optional fields can be added without exposing the
          /// internal synchronization model to ACP clients.
          #[derive(Debug, Clone, Default, PartialEq, Eq, serde::Serialize, serde::Deserialize)]
          #[serde(rename_all = "camelCase")]
          pub struct StatusRuntimeWireSnapshot {
              pub revision: u64,
              pub run_state: StatusRunState,
              pub model_id: String,
              pub context_window: u64,
              pub max_completion_tokens: Option<u32>,
              pub catalog_stale: bool,
              pub turn_input_tokens: u64,
              pub turn_output_tokens: u64,
              pub turn_cached_input_tokens: u64,
              pub session_input_tokens: u64,
              pub session_output_tokens: u64,
              pub session_cached_input_tokens: u64,
              pub cost_currency: Option<String>,
              pub turn_cost_microunits: Option<u64>,
              pub session_cost_microunits: Option<u64>,
              pub turn_api_duration_ms: Option<u64>,
              pub session_api_duration_ms: Option<u64>,
              pub last_request_ms: Option<u64>,
              pub time_to_first_token_ms: Option<u64>,
              pub last_tool_ms: Option<u64>,
              pub active_tools: u32,
              pub queued_tools: u32,
              pub last_tool_name: Option<String>,
              pub pending_interactions: u32,
          }

          impl From<&StatusRuntimeSnapshot> for StatusRuntimeWireSnapshot {
              fn from(snapshot: &StatusRuntimeSnapshot) -> Self {
                  Self {
                      revision: snapshot.revision,
                      run_state: snapshot.run_state,
                      model_id: snapshot.model.model_id.clone(),
                      context_window: snapshot.model.context_window,
                      max_completion_tokens: snapshot.model.max_completion_tokens,
                      catalog_stale: snapshot.model.catalog_stale,
                      turn_input_tokens: snapshot.tokens.turn_input,
                      turn_output_tokens: snapshot.tokens.turn_output,
                      turn_cached_input_tokens: snapshot.tokens.turn_cached_input,
                      session_input_tokens: snapshot.tokens.session_input,
                      session_output_tokens: snapshot.tokens.session_output,
                      session_cached_input_tokens: snapshot.tokens.session_cached_input,
                      cost_currency: snapshot.cost.currency.clone(),
                      turn_cost_microunits: snapshot.cost.turn_microunits,
                      session_cost_microunits: snapshot.cost.session_microunits,
                      turn_api_duration_ms: snapshot.latency.turn_api_duration_ms,
                      session_api_duration_ms: snapshot.latency.session_api_duration_ms,
                      last_request_ms: snapshot.latency.last_request_ms,
                      time_to_first_token_ms: snapshot.latency.time_to_first_token_ms,
                      last_tool_ms: snapshot.latency.last_tool_ms,
                      active_tools: snapshot.tools.active_count,
                      queued_tools: snapshot.tools.queued_count,
                      last_tool_name: snapshot.tools.last_tool_name.clone(),
                      pending_interactions: snapshot.pending_interactions,
                  }
              }
          }

          #[derive(Debug, Clone, PartialEq, Eq, serde::Serialize, serde::Deserialize)]
          #[serde(rename_all = "camelCase")]
          pub struct StatusRuntimeNotification {
              pub session_id: agent_client_protocol::SessionId,
              pub status: StatusRuntimeWireSnapshot,
          }
          '''
              if source.count(anchor) != 1:
                  raise SystemExit('StatusRuntimeSnapshot impl anchor changed')
              source = source.replace(anchor, anchor + wire)

              old = '    current: RwLock<Arc<StatusRuntimeSnapshot>>,\n    /// Backend-hosted tools'
              new = '    current: RwLock<Arc<StatusRuntimeSnapshot>>,\n    changes: tokio::sync::watch::Sender<Arc<StatusRuntimeSnapshot>>,\n    /// Backend-hosted tools'
              if source.count(old) != 1:
                  raise SystemExit('StatusRuntimeInner anchor changed')
              source = source.replace(old, new)

              old = '''    pub fn new(initial: StatusRuntimeSnapshot) -> Self {
                  Self {
                      inner: Arc::new(StatusRuntimeInner {
                          current: RwLock::new(Arc::new(initial)),
                          backend_tools: Mutex::new(HashMap::new()),
                      }),
                  }
              }
          '''
              new = '''    pub fn new(initial: StatusRuntimeSnapshot) -> Self {
                  let initial = Arc::new(initial);
                  let (changes, _initial_receiver) = tokio::sync::watch::channel(initial.clone());
                  Self {
                      inner: Arc::new(StatusRuntimeInner {
                          current: RwLock::new(initial),
                          changes,
                          backend_tools: Mutex::new(HashMap::new()),
                      }),
                  }
              }
          '''
              if source.count(old) != 1:
                  raise SystemExit('StatusRuntimePublisher::new anchor changed')
              source = source.replace(old, new)

              old = '''    pub fn snapshot(&self) -> Arc<StatusRuntimeSnapshot> {
                  self.inner
                      .current
                      .read()
                      .unwrap_or_else(|poisoned| poisoned.into_inner())
                      .clone()
              }
          '''
              new = old + '''
              /// Subscribe to coalesced immutable generations. A new receiver starts at
              /// the current snapshot, so late transport bridges do not need a replay log.
              pub fn subscribe(&self) -> tokio::sync::watch::Receiver<Arc<StatusRuntimeSnapshot>> {
                  self.inner.changes.subscribe()
              }
          '''
              if source.count(old) != 1:
                  raise SystemExit('snapshot method anchor changed')
              source = source.replace(old, new)

              old = '''    pub fn update(
                  &self,
                  mutate: impl FnOnce(&mut StatusRuntimeSnapshot),
              ) -> Arc<StatusRuntimeSnapshot> {
                  let mut current = self
                      .inner
                      .current
                      .write()
                      .unwrap_or_else(|poisoned| poisoned.into_inner());
                  let mut next = (**current).clone();
                  mutate(&mut next);
                  next.revision = next.revision.saturating_add(1);
                  let next = Arc::new(next);
                  *current = next.clone();
                  next
              }
          '''
              new = '''    pub fn update(
                  &self,
                  mutate: impl FnOnce(&mut StatusRuntimeSnapshot),
              ) -> Arc<StatusRuntimeSnapshot> {
                  let next = {
                      let mut current = self
                          .inner
                          .current
                          .write()
                          .unwrap_or_else(|poisoned| poisoned.into_inner());
                      let mut next = (**current).clone();
                      mutate(&mut next);
                      next.revision = next.revision.saturating_add(1);
                      let next = Arc::new(next);
                      *current = next.clone();
                      next
                  };
                  self.inner.changes.send_replace(next.clone());
                  next
              }
          '''
              if source.count(old) != 1:
                  raise SystemExit('update method anchor changed')
              source = source.replace(old, new)

              old = '''    fn update_if(
                  &self,
                  mutate: impl FnOnce(&mut StatusRuntimeSnapshot) -> bool,
              ) -> Option<Arc<StatusRuntimeSnapshot>> {
                  let mut current = self
                      .inner
                      .current
                      .write()
                      .unwrap_or_else(|poisoned| poisoned.into_inner());
                  let mut next = (**current).clone();
                  if !mutate(&mut next) {
                      return None;
                  }
                  next.revision = next.revision.saturating_add(1);
                  let next = Arc::new(next);
                  *current = next.clone();
                  Some(next)
              }
          '''
              new = '''    fn update_if(
                  &self,
                  mutate: impl FnOnce(&mut StatusRuntimeSnapshot) -> bool,
              ) -> Option<Arc<StatusRuntimeSnapshot>> {
                  let next = {
                      let mut current = self
                          .inner
                          .current
                          .write()
                          .unwrap_or_else(|poisoned| poisoned.into_inner());
                      let mut next = (**current).clone();
                      if !mutate(&mut next) {
                          return None;
                      }
                      next.revision = next.revision.saturating_add(1);
                      let next = Arc::new(next);
                      *current = next.clone();
                      next
                  };
                  self.inner.changes.send_replace(next.clone());
                  Some(next)
              }
          '''
              if source.count(old) != 1:
                  raise SystemExit('update_if method anchor changed')
              source = source.replace(old, new)
              status_path.write_text(source)

          acp_types = Path('crates/codegen/xai-grok-shell/src/session/acp_types.rs')
          source = acp_types.read_text()
          if 'pub status_runtime:' not in source:
              old = '    pub turns: u64,\n    /// Current turn (0-based).'
              new = '''    pub turns: u64,
              /// Latest ephemeral runtime status for initial/late-attaching clients.
              #[serde(default, skip_serializing_if = "Option::is_none")]
              pub status_runtime: Option<super::status_runtime_snapshot::StatusRuntimeWireSnapshot>,
              /// Current turn (0-based).'''
              if source.count(old) != 1:
                  raise SystemExit('SessionInfoData anchor changed')
              acp_types.write_text(source.replace(old, new))

          setup = Path('crates/codegen/xai-grok-shell/src/session/acp_session_impl/session_setup.rs')
          source = setup.read_text()
          if 'status_runtime: Some(' not in source:
              old = '''            agent_name: Some(agent_name),
                          turns: turns as u64,
                          turn_index,'''
              new = '''            agent_name: Some(agent_name),
                          turns: turns as u64,
                          status_runtime: Some(
                              crate::session::status_runtime_snapshot::StatusRuntimeWireSnapshot::from(
                                  self.status_runtime.snapshot().as_ref(),
                              ),
                          ),
                          turn_index,'''
              if source.count(old) != 1:
                  raise SystemExit('build_session_info anchor changed')
              setup.write_text(source.replace(old, new))

          spawn = Path('crates/codegen/xai-grok-shell/src/session/acp_session_impl/spawn.rs')
          source = spawn.read_text()
          if 'spawn_status_runtime_bridge' not in source:
              old = '''    let status_runtime = crate::session::status_runtime_snapshot::StatusRuntimePublisher::new(
                  crate::session::status_runtime_snapshot::StatusRuntimeSnapshot::from_session_model(
                      &snapshot_resolution.snapshot,
                  ),
              );'''
              new = old + '''
              crate::session::status_runtime_bridge::spawn_status_runtime_bridge(
                  status_runtime.clone(),
                  gateway.clone(),
                  session_info.id.clone(),
              );'''
              if source.count(old) != 1:
                  raise SystemExit('status runtime spawn anchor changed')
              spawn.write_text(source.replace(old, new))

          mod_path = Path('crates/codegen/xai-grok-shell/src/session/mod.rs')
          source = mod_path.read_text()
          if 'status_runtime_bridge' not in source:
              old = 'pub mod status_runtime_snapshot;\n'
              if source.count(old) != 1:
                  raise SystemExit('session mod anchor changed')
              mod_path.write_text(source.replace(old, old + 'pub(crate) mod status_runtime_bridge;\n'))

          bridge = Path('crates/codegen/xai-grok-shell/src/session/status_runtime_bridge.rs')
          if not bridge.exists():
              bridge.write_text('''//! Ephemeral status publication from a session-local watch channel to ACP.
          //!
          //! Writers only update in-memory state. This bridge coalesces generations when
          //! a client is slow and sends the latest immutable wire snapshot without
          //! persisting it to the conversation log.

          use agent_client_protocol as acp;
          use xai_acp_lib::AcpAgentGatewaySender as GatewaySender;

          use super::status_runtime_snapshot::{
              STATUS_RUNTIME_NOTIFICATION_METHOD, StatusRuntimeNotification, StatusRuntimePublisher,
              StatusRuntimeWireSnapshot,
          };

          pub(crate) fn spawn_status_runtime_bridge(
              status_runtime: StatusRuntimePublisher,
              gateway: GatewaySender,
              session_id: acp::SessionId,
          ) {
              let mut updates = status_runtime.subscribe();
              tokio::task::spawn_local(async move {
                  loop {
                      let snapshot = updates.borrow_and_update().clone();
                      let notification = StatusRuntimeNotification {
                          session_id: session_id.clone(),
                          status: StatusRuntimeWireSnapshot::from(snapshot.as_ref()),
                      };
                      if let Ok(params) = serde_json::value::to_raw_value(&notification) {
                          gateway.forward_fire_and_forget(acp::ExtNotification::new(
                              STATUS_RUNTIME_NOTIFICATION_METHOD,
                              params.into(),
                          ));
                      }
                      if updates.changed().await.is_err() {
                          break;
                      }
                  }
              });
          }
          ''')

          contract = Path('crates/codegen/xai-grok-shell/tests/status_runtime_snapshot_contract.rs')
          source = contract.read_text()
          if 'wire_projection_is_stable_and_excludes_prompt_ownership' not in source:
              source += '''

          #[test]
          fn wire_projection_is_stable_and_excludes_prompt_ownership() {
              let publisher = StatusRuntimePublisher::new(StatusRuntimeSnapshot::default());
              publisher.begin_turn("private-prompt-id");
              publisher.publish_request_latency("private-prompt-id", 120, Some(35));

              let wire =
                  xai_grok_shell::session::status_runtime_snapshot::StatusRuntimeWireSnapshot::from(
                      publisher.snapshot().as_ref(),
                  );
              let value = serde_json::to_value(&wire).expect("wire snapshot serializes");
              assert_eq!(value["runState"], "running");
              assert_eq!(value["lastRequestMs"], 120);
              assert_eq!(value["timeToFirstTokenMs"], 35);
              assert!(value.get("activePromptId").is_none());

              let round_trip = serde_json::from_value::<
                  xai_grok_shell::session::status_runtime_snapshot::StatusRuntimeWireSnapshot,
              >(value)
              .expect("wire snapshot round-trips");
              assert_eq!(round_trip, wire);
          }

          #[test]
          fn subscribers_start_current_and_receive_only_published_generations() {
              let publisher = StatusRuntimePublisher::new(StatusRuntimeSnapshot::default());
              let mut subscriber = publisher.subscribe();
              assert_eq!(subscriber.borrow().revision, 0);

              publisher.begin_turn("turn-a");
              assert!(subscriber.has_changed().expect("channel remains open"));
              assert_eq!(subscriber.borrow_and_update().revision, 1);

              let revision = publisher.snapshot().revision;
              assert!(publisher.publish_request_latency("stale", 999, None).is_none());
              assert_eq!(publisher.snapshot().revision, revision);
              assert!(!subscriber.has_changed().expect("channel remains open"));
          }
          '''
              contract.write_text(source)
          PY

          rustfmt --edition 2024 --config skip_children=true \
            crates/codegen/xai-grok-shell/src/session/status_runtime_snapshot.rs \
            crates/codegen/xai-grok-shell/src/session/status_runtime_bridge.rs \
            crates/codegen/xai-grok-shell/src/session/acp_types.rs \
            crates/codegen/xai-grok-shell/src/session/acp_session_impl/session_setup.rs \
            crates/codegen/xai-grok-shell/src/session/acp_session_impl/spawn.rs \
            crates/codegen/xai-grok-shell/src/session/mod.rs \
            crates/codegen/xai-grok-shell/tests/status_runtime_snapshot_contract.rs

      - name: Test status wire contract
        run: cargo test -p xai-grok-shell --test status_runtime_snapshot_contract

      - name: Check production dttn binary
        run: cargo check -p xai-grok-pager-bin --bin dttn

      - name: Validate patch whitespace
        shell: bash
        run: git diff --check

      - name: Commit validated wire bridge
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'wire bridge already applied'
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            crates/codegen/xai-grok-shell/src/session/status_runtime_snapshot.rs \
            crates/codegen/xai-grok-shell/src/session/status_runtime_bridge.rs \
            crates/codegen/xai-grok-shell/src/session/acp_types.rs \
            crates/codegen/xai-grok-shell/src/session/acp_session_impl/session_setup.rs \
            crates/codegen/xai-grok-shell/src/session/acp_session_impl/spawn.rs \
            crates/codegen/xai-grok-shell/src/session/mod.rs \
            crates/codegen/xai-grok-shell/tests/status_runtime_snapshot_contract.rs
          git diff --cached --check
          git commit -m 'feat: publish status runtime wire snapshots'
          git push origin "HEAD:${HEAD_BRANCH}"
