name: One-shot release hardening

on:
  push:
    branches:
      - agent/release-hardening-alpha5

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Apply release hardening patch
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import re
          import textwrap

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected exactly one occurrence, found {count}: {old[:80]!r}")
              p.write_text(text.replace(old, new, 1))

          # The shipped binary package is the sole release-version source.
          replace_once(
              "crates/codegen/xai-grok-pager-bin/Cargo.toml",
              'version = "0.1.220-alpha.4"',
              'version = "0.1.220-alpha.5"',
          )

          version_manifest = Path("crates/codegen/xai-grok-version/Cargo.toml")
          vm = version_manifest.read_text()
          if 'build = "build.rs"' not in vm:
              vm = vm.replace('edition.workspace = true\n', 'edition.workspace = true\nbuild = "build.rs"\n', 1)
          vm = vm.replace('description = "Lockstepped grok CLI version."', 'description = "Lockstepped DTTN CLI version sourced from the shipping binary package."')
          version_manifest.write_text(vm)

          Path("crates/codegen/xai-grok-version/build.rs").write_text(textwrap.dedent(r'''
              use std::fs;
              use std::path::PathBuf;

              fn main() {
                  let manifest_dir = PathBuf::from(
                      std::env::var("CARGO_MANIFEST_DIR").expect("CARGO_MANIFEST_DIR is set"),
                  );
                  let shipping_manifest = manifest_dir.join("../xai-grok-pager-bin/Cargo.toml");
                  println!("cargo:rerun-if-changed={}", shipping_manifest.display());

                  let manifest = fs::read_to_string(&shipping_manifest)
                      .unwrap_or_else(|error| panic!("failed to read {}: {error}", shipping_manifest.display()));
                  let version = manifest
                      .lines()
                      .find_map(|line| line.strip_prefix("version = \"").and_then(|value| value.strip_suffix('"')))
                      .expect("xai-grok-pager-bin package version must be present");

                  println!("cargo:rustc-env=DTTN_VERSION={version}");
              }
          ''').lstrip())

          version_lib = Path("crates/codegen/xai-grok-version/src/lib.rs")
          vl = version_lib.read_text()
          vl = vl.replace('//! Installed grok CLI version, lockstepped with shipping binaries.', '//! Installed DTTN CLI version, sourced from the shipping binary package.')
          vl = vl.replace('pub const TEST_VERSION_ENV: &str = "GROK_TEST_VERSION";', 'pub const TEST_VERSION_ENV: &str = "DTTN_TEST_VERSION";\npub const LEGACY_TEST_VERSION_ENV: &str = "GROK_TEST_VERSION";')
          vl = re.sub(
              r'pub const VERSION: &str = match option_env!\("GROK_VERSION"\) \{\n    Some\(v\) => v,\n    None => env!\("CARGO_PKG_VERSION"\),\n\};',
              'pub const VERSION: &str = env!("DTTN_VERSION");',
              vl,
              count=1,
          )
          vl = vl.replace(
              'std::env::var(TEST_VERSION_ENV)\n        .map(|v| v.trim().to_string())\n        .unwrap_or_else(|_| VERSION.to_string())',
              'std::env::var(TEST_VERSION_ENV)\n        .or_else(|_| std::env::var(LEGACY_TEST_VERSION_ENV))\n        .map(|v| v.trim().to_string())\n        .unwrap_or_else(|_| VERSION.to_string())',
          )
          version_lib.write_text(vl)

          # Disable every in-process installer backend for the first public alpha.
          auto_path = Path("crates/codegen/xai-grok-update/src/auto_update.rs")
          auto = auto_path.read_text()
          old_installer = '''pub async fn get_installer() -> Option<&'static str> {
              if let Some(i) = env_installer() {
                  return Some(i);
              }
              let cfg = config::load_config().await;
              match cfg.cli.installer.as_deref() {
                  Some("npm") => Some("npm"),
                  Some("gh-release") => Some("gh-release"),
                  _ => Some("internal"),
              }
          }'''
          new_installer = '''/// DTTN alpha releases deliberately do not perform in-process updates.
          ///
          /// Keeping this as the single backend-selection chokepoint guarantees that
          /// startup checks, leader checks, minimum-version handling, and TUI checks
          /// cannot reach any inherited Grok/x.ai installer implementation.
          pub async fn get_installer() -> Option<&'static str> {
              None
          }'''
          if old_installer not in auto:
              raise SystemExit("auto_update.rs: get_installer implementation did not match expected source")
          auto = auto.replace(old_installer, new_installer, 1)
          replacements = {
              'https://x.ai/cli/install.ps1': 'https://github.com/yichensunjoe/DTTN-CLI/releases',
              'https://x.ai/cli/install.sh': 'https://github.com/yichensunjoe/DTTN-CLI/releases',
              '@xai-official/grok': 'DTTN-CLI',
              'xai-org-shared/grok-build': 'yichensunjoe/DTTN-CLI',
              'Run `grok update`': 'Run `dttn update`',
              'explicit `grok update`': 'explicit `dttn update`',
              'fresh blocking `grok update`': 'fresh blocking `dttn update`',
              'Restarting Grok': 'Restarting DTTN',
              'Grok Build': 'DTTN',
          }
          for old, new in replacements.items():
              auto = auto.replace(old, new)
          auto_path.write_text(auto)

          version_path = Path("crates/codegen/xai-grok-update/src/version.rs")
          uv = version_path.read_text()
          uv = uv.replace('const NPM_PACKAGE: &str = "@xai-official/grok";', 'const NPM_PACKAGE: &str = "dttn-cli-self-update-disabled";')
          uv = uv.replace('pub const GH_RELEASE_REPO: &str = "xai-org-shared/grok-build";', 'pub const GH_RELEASE_REPO: &str = "yichensunjoe/DTTN-CLI";')
          uv = uv.replace('pub(crate) const CLI_BASE_URL_PRIMARY: &str = "https://x.ai/cli";', 'pub(crate) const CLI_BASE_URL_PRIMARY: &str =\n    "https://github.com/yichensunjoe/DTTN-CLI/releases";')
          uv = uv.replace('pub(crate) const CLI_BASE_URL_FALLBACK: &str =\n    "https://storage.googleapis.com/grok-build-public-artifacts/cli";', 'pub(crate) const CLI_BASE_URL_FALLBACK: &str = CLI_BASE_URL_PRIMARY;')
          uv = uv.replace('pub(crate) const CLI_BASE_URLS: &[&str] = &[CLI_BASE_URL_PRIMARY, CLI_BASE_URL_FALLBACK];', 'pub(crate) const CLI_BASE_URLS: &[&str] = &[CLI_BASE_URL_PRIMARY];')
          version_path.write_text(uv)

          minimum_path = Path("crates/codegen/xai-grok-update/src/minimum_version.rs")
          minimum = minimum_path.read_text()
          minimum = minimum.replace('Grok configuration', 'DTTN configuration')
          minimum = minimum.replace('version of Grok', 'version of DTTN')
          minimum = minimum.replace('install Grok', 'install DTTN')
          minimum = minimum.replace('Run `grok update`', 'Install the latest DTTN version from GitHub Releases')
          minimum = minimum.replace('Run `grok` to start.', 'Run `dttn` to start.')
          minimum_path.write_text(minimum)

          main_path = Path("crates/codegen/xai-grok-pager-bin/src/main.rs")
          main = main_path.read_text()
          main = main.replace('"grok {}",\n                        xai_grok_version::display_version_with_commit(', '"dttn {}",\n                        xai_grok_version::display_version_with_commit(', 1)
          main = main.replace('"Grok Build (pager) - v{}",', '"DTTN - v{}",', 1)
          main = main.replace('Couldn\'t start Grok:', 'Couldn\'t start DTTN:')
          main = main.replace('Update Grok to a version', 'Update DTTN to a version')
          main = main.replace('Grok crashed during your last session.', 'DTTN crashed during your last session.')

          update_arm = re.compile(r'''            Command::Update \{
                  check,
                  json,
                  force_reinstall,
                  version,
                  alpha,
                  stable,
                  enterprise,
              \} => \{
                  init_tracing_simple\("cli"\);
                  let _otel_guard = xai_grok_telemetry::otel_layer::otel_guard\(\);
                  let channel_switch = get_channel_switch\(alpha, stable, enterprise\);
                  return run_update_command\(
                      check,
                      json,
                      force_reinstall,
                      version,
                      channel_switch,
                      &update_config,
                  \)
                  \.await;
              \}''')
          replacement_arm = '''            Command::Update { json, .. } => {
                  init_tracing_simple("cli");
                  let _otel_guard = xai_grok_telemetry::otel_layer::otel_guard();
                  if json {
                      println!(
                          "{}",
                          serde_json::json!({
                              "enabled": false,
                              "channel": "alpha",
                              "repository": "yichensunjoe/DTTN-CLI",
                              "message": "DTTN self-update is not enabled in this alpha release. Install the latest version from the DTTN GitHub Release."
                          })
                      );
                  } else {
                      println!("DTTN self-update is not enabled in this alpha release.");
                      println!("Install the latest version from the DTTN GitHub Release:");
                      println!("  https://github.com/yichensunjoe/DTTN-CLI/releases");
                  }
                  return Ok(());
              }'''
          main, count = update_arm.subn(replacement_arm, main, count=1)
          if count != 1:
              raise SystemExit(f"main.rs: expected to replace one update arm, replaced {count}")
          main_path.write_text(main)

          docs = Path("docs/windows.md")
          doc_text = docs.read_text()
          marker = "## Release channels"
          if marker not in doc_text:
              doc_text += textwrap.dedent('''

                  ## Release channels

                  The default installer resolves GitHub's latest stable release and does not select prereleases.
                  Install an Alpha or release candidate only by passing its exact tag:

                  ```powershell
                  .\\scripts\\install-windows.ps1 -Version v0.1.220-alpha.5
                  ```

                  In-process self-update is intentionally disabled for the first public Alpha. Upgrade by running
                  the installer again with an explicit tag or, after a stable release exists, with the default
                  `latest` selection.
              ''')
          docs.write_text(doc_text)

          release_workflow = textwrap.dedent(r'''
              name: DTTN Windows Release

              on:
                pull_request:
                  branches:
                    - main
                  paths:
                    - '.github/workflows/dttn-windows-release.yml'
                    - 'scripts/install-windows.ps1'
                    - 'docs/windows.md'
                    - 'Cargo.toml'
                    - 'Cargo.lock'
                    - 'rust-toolchain.toml'
                    - '.cargo/**'
                    - 'crates/build/xai-proto-build/**'
                    - 'crates/codegen/xai-grok-pager-bin/**'
                    - 'crates/codegen/xai-grok-pager/**'
                    - 'crates/codegen/xai-grok-shell/**'
                    - 'crates/codegen/xai-grok-sandbox/**'
                    - 'crates/codegen/xai-grok-update/**'
                    - 'crates/codegen/xai-grok-version/**'
                workflow_dispatch:
                push:
                  tags:
                    - 'v*'

              concurrency:
                group: dttn-windows-release-${{ github.ref }}
                cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

              permissions:
                contents: read

              env:
                CARGO_TERM_COLOR: always
                CARGO_INCREMENTAL: '0'
                RUST_BACKTRACE: '1'
                WINDOWS_ASSET_NAME: dttn-windows-x86_64

              jobs:
                release-gate:
                  name: Validate release metadata
                  runs-on: ubuntu-latest
                  outputs:
                    version: ${{ steps.meta.outputs.version }}
                    prerelease: ${{ steps.meta.outputs.prerelease }}
                  steps:
                    - name: Checkout full history
                      uses: actions/checkout@v6
                      with:
                        fetch-depth: 0

                    - name: Validate version source and tag
                      id: meta
                      shell: bash
                      run: |
                        set -euo pipefail
                        PACKAGE_VERSION="$(python3 - <<'PY'
                        import tomllib
                        from pathlib import Path
                        data = tomllib.loads(Path('crates/codegen/xai-grok-pager-bin/Cargo.toml').read_text())
                        print(data['package']['version'])
                        PY
                        )"
                        printf 'version=%s\n' "$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
                        if [[ "$PACKAGE_VERSION" == *-* ]]; then
                          printf 'prerelease=true\n' >> "$GITHUB_OUTPUT"
                        else
                          printf 'prerelease=false\n' >> "$GITHUB_OUTPUT"
                        fi

                        if ! [[ "$PACKAGE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?(\+[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
                          echo "Invalid package SemVer: $PACKAGE_VERSION" >&2
                          exit 1
                        fi

                        VERSION_SOURCE="$(grep -F 'pub const VERSION: &str = env!("DTTN_VERSION");' crates/codegen/xai-grok-version/src/lib.rs || true)"
                        test -n "$VERSION_SOURCE"

                        if grep -R -n -E 'https://x\.ai/cli|storage\.googleapis\.com/grok-build-public-artifacts|@xai-official/grok|xai-org-shared/grok-build' \
                          crates/codegen/xai-grok-update crates/codegen/xai-grok-pager-bin/src/main.rs; then
                          echo 'Inherited Grok/x.ai update source remains in the shipping update path.' >&2
                          exit 1
                        fi

                        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
                          TAG_VERSION="${GITHUB_REF_NAME#v}"
                          if [[ "$GITHUB_REF_NAME" != v* ]] || [[ -z "$TAG_VERSION" ]]; then
                            echo "Release tag must use v<semver>: $GITHUB_REF_NAME" >&2
                            exit 1
                          fi
                          test "$TAG_VERSION" = "$PACKAGE_VERSION"
                          git fetch origin main --depth=1
                          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
                        fi

                build-windows-x64:
                  name: Build and package Windows x64
                  needs: release-gate
                  runs-on: windows-latest
                  timeout-minutes: 120
                  env:
                    DTTN_VERSION: ${{ needs.release-gate.outputs.version }}
                  steps:
                    - name: Checkout
                      uses: actions/checkout@v6

                    - name: Install protoc
                      shell: pwsh
                      run: choco install protoc --no-progress -y

                    - name: Show toolchain
                      shell: pwsh
                      run: |
                        rustc --version
                        cargo --version
                        protoc --version

                    - name: Restore Cargo cache
                      id: cargo_cache
                      uses: actions/cache/restore@v4
                      with:
                        path: |
                          ~/.cargo/registry
                          ~/.cargo/git
                          target
                        key: windows-x64-cargo-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'rust-toolchain.toml') }}
                        restore-keys: |
                          windows-x64-cargo-

                    - name: Build release binary
                      id: build
                      continue-on-error: true
                      shell: pwsh
                      run: |
                        $ErrorActionPreference = 'Stop'
                        $PSNativeCommandUseErrorActionPreference = $false
                        $logPath = Join-Path $env:RUNNER_TEMP 'dttn-windows-build.log'
                        & cargo build --locked --profile release-dist `
                          -p xai-grok-pager-bin `
                          --bin dttn `
                          --features release-dist 2>&1 | Tee-Object -FilePath $logPath
                        $exitCode = $LASTEXITCODE
                        "exit_code=$exitCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                        exit $exitCode

                    - name: Upload Windows build log
                      if: always()
                      uses: actions/upload-artifact@v4
                      with:
                        name: dttn-windows-build-log
                        path: ${{ runner.temp }}/dttn-windows-build.log
                        if-no-files-found: warn
                        retention-days: 14

                    - name: Save Cargo cache
                      if: steps.build.outcome == 'success' && steps.cargo_cache.outputs.cache-hit != 'true'
                      uses: actions/cache/save@v4
                      with:
                        path: |
                          ~/.cargo/registry
                          ~/.cargo/git
                          target
                        key: windows-x64-cargo-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'rust-toolchain.toml') }}

                    - name: Enforce successful release build
                      if: steps.build.outcome != 'success'
                      shell: pwsh
                      run: throw "Windows release build failed with exit code ${{ steps.build.outputs.exit_code }}. Download the build log artifact."

                    - name: Verify binary identity and disabled updater
                      shell: pwsh
                      env:
                        EXPECTED_VERSION: ${{ needs.release-gate.outputs.version }}
                      run: |
                        $ErrorActionPreference = 'Stop'
                        $binary = 'target\release-dist\dttn.exe'
                        $help = & $binary --help
                        if ($LASTEXITCODE -ne 0) { throw "dttn.exe --help failed: $LASTEXITCODE" }
                        $version = (& $binary --version | Out-String).Trim()
                        if ($version -notmatch [regex]::Escape($env:EXPECTED_VERSION)) {
                          throw "dttn.exe --version '$version' does not contain $env:EXPECTED_VERSION"
                        }
                        $versionJson = (& $binary version --json | ConvertFrom-Json)
                        if ([string]$versionJson.currentVersion -notmatch [regex]::Escape($env:EXPECTED_VERSION)) {
                          throw "dttn version --json does not report $env:EXPECTED_VERSION"
                        }
                        $update = (& $binary update --json | ConvertFrom-Json)
                        if ($update.enabled -ne $false -or $update.repository -ne 'yichensunjoe/DTTN-CLI') {
                          throw 'DTTN alpha updater is not safely disabled.'
                        }

                    - name: Package release archive
                      shell: pwsh
                      run: |
                        $ErrorActionPreference = 'Stop'
                        $assetName = $env:WINDOWS_ASSET_NAME
                        $packageRoot = Join-Path $PWD "dist\$assetName"
                        New-Item -ItemType Directory -Path $packageRoot -Force | Out-Null
                        Copy-Item target\release-dist\dttn.exe $packageRoot
                        Copy-Item README.md $packageRoot
                        Copy-Item LICENSE $packageRoot
                        Copy-Item docs\windows.md (Join-Path $packageRoot 'WINDOWS.md')
                        $archive = Join-Path $PWD "dist\$assetName.zip"
                        Compress-Archive -Path "$packageRoot\*" -DestinationPath $archive -Force
                        $hash = (Get-FileHash -Algorithm SHA256 -Path $archive).Hash.ToLowerInvariant()
                        "$hash  $assetName.zip" | Set-Content -Path (Join-Path $PWD "dist\$assetName.zip.sha256") -Encoding ascii -NoNewline

                    - name: Upload Windows artifact
                      uses: actions/upload-artifact@v4
                      with:
                        name: ${{ env.WINDOWS_ASSET_NAME }}
                        path: |
                          dist/${{ env.WINDOWS_ASSET_NAME }}.zip
                          dist/${{ env.WINDOWS_ASSET_NAME }}.zip.sha256
                        if-no-files-found: error
                        retention-days: 14

                test-windows-installer:
                  name: Test Windows installer
                  needs:
                    - release-gate
                    - build-windows-x64
                  runs-on: windows-latest
                  timeout-minutes: 20
                  steps:
                    - name: Checkout
                      uses: actions/checkout@v6
                    - name: Download Windows artifact
                      uses: actions/download-artifact@v5
                      with:
                        name: ${{ env.WINDOWS_ASSET_NAME }}
                        path: dist
                    - name: Test PowerShell installer offline
                      shell: pwsh
                      env:
                        EXPECTED_VERSION: ${{ needs.release-gate.outputs.version }}
                      run: |
                        $ErrorActionPreference = 'Stop'
                        $installDir = Join-Path $env:RUNNER_TEMP 'dttn-install\bin'
                        1..2 | ForEach-Object {
                          & scripts\install-windows.ps1 -ArchivePath "dist\$env:WINDOWS_ASSET_NAME.zip" -ChecksumPath "dist\$env:WINDOWS_ASSET_NAME.zip.sha256" -InstallDir $installDir -NoPathUpdate
                        }
                        $installed = Join-Path $installDir 'dttn.exe'
                        $version = (& $installed --version | Out-String).Trim()
                        if ($version -notmatch [regex]::Escape($env:EXPECTED_VERSION)) { throw "Installed version mismatch: $version" }
                        $stagedFiles = @(Get-ChildItem -LiteralPath $installDir -Filter 'dttn.install-*.exe' -File -ErrorAction SilentlyContinue)
                        if ($stagedFiles.Count -ne 0) { throw "Installer left staged executables behind." }
                    - name: Reject a tampered archive
                      shell: pwsh
                      run: |
                        $ErrorActionPreference = 'Stop'
                        $tamperedArchive = Join-Path $env:RUNNER_TEMP 'dttn-tampered.zip'
                        Copy-Item "dist\$env:WINDOWS_ASSET_NAME.zip" $tamperedArchive
                        [IO.File]::AppendAllText($tamperedArchive, 'tampered')
                        $installDir = Join-Path $env:RUNNER_TEMP 'dttn-tampered-install\bin'
                        try {
                          & scripts\install-windows.ps1 -ArchivePath $tamperedArchive -ChecksumPath "dist\$env:WINDOWS_ASSET_NAME.zip.sha256" -InstallDir $installDir -NoPathUpdate
                          throw 'Installer unexpectedly accepted a tampered archive.'
                        } catch {
                          if ($_.Exception.Message -notmatch 'SHA-256 verification failed') { throw }
                        }
                        if (Test-Path (Join-Path $installDir 'dttn.exe')) { throw 'Installer wrote dttn.exe after checksum failure.' }

                publish-release:
                  name: Publish tagged Windows release
                  if: startsWith(github.ref, 'refs/tags/v')
                  needs:
                    - release-gate
                    - build-windows-x64
                    - test-windows-installer
                  runs-on: ubuntu-latest
                  permissions:
                    contents: write
                  steps:
                    - name: Download Windows artifact
                      uses: actions/download-artifact@v5
                      with:
                        name: ${{ env.WINDOWS_ASSET_NAME }}
                        path: dist
                    - name: Create complete GitHub release
                      env:
                        GH_TOKEN: ${{ github.token }}
                        TAG_NAME: ${{ github.ref_name }}
                        IS_PRERELEASE: ${{ needs.release-gate.outputs.prerelease }}
                      shell: bash
                      run: |
                        set -euo pipefail
                        if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
                          echo "Release $TAG_NAME already exists; refusing to overwrite it." >&2
                          exit 1
                        fi
                        args=(
                          "$TAG_NAME"
                          "dist/${WINDOWS_ASSET_NAME}.zip"
                          "dist/${WINDOWS_ASSET_NAME}.zip.sha256"
                          --repo "$GITHUB_REPOSITORY"
                          --title "DTTN $TAG_NAME"
                          --verify-tag
                          --generate-notes
                        )
                        if [[ "$IS_PRERELEASE" == true ]]; then
                          args+=(--prerelease --latest=false)
                        fi
                        gh release create "${args[@]}"
                        actual="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG_NAME" --jq .prerelease)"
                        test "$actual" = "$IS_PRERELEASE"
                        for asset in "${WINDOWS_ASSET_NAME}.zip" "${WINDOWS_ASSET_NAME}.zip.sha256"; do
                          gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG_NAME" --jq '.assets[].name' | grep -Fx "$asset"
                        done

                validate-published-release:
                  name: Validate published Windows release
                  if: startsWith(github.ref, 'refs/tags/v')
                  needs:
                    - release-gate
                    - publish-release
                  runs-on: windows-latest
                  timeout-minutes: 20
                  steps:
                    - name: Checkout installer
                      uses: actions/checkout@v6
                    - name: Install from GitHub Release API
                      shell: pwsh
                      env:
                        TAG_NAME: ${{ github.ref_name }}
                        EXPECTED_VERSION: ${{ needs.release-gate.outputs.version }}
                      run: |
                        $ErrorActionPreference = 'Stop'
                        $installDir = Join-Path $env:RUNNER_TEMP 'dttn-online-install\bin'
                        & scripts\install-windows.ps1 -Version $env:TAG_NAME -InstallDir $installDir -NoPathUpdate
                        $installed = Join-Path $installDir 'dttn.exe'
                        $version = (& $installed --version | Out-String).Trim()
                        if ($version -notmatch [regex]::Escape($env:EXPECTED_VERSION)) {
                          throw "Published installer version mismatch: $version"
                        }
            ''').lstrip()
          Path(".github/workflows/dttn-windows-release.yml").write_text(release_workflow)

          # The one-shot workflow removes itself before the final commit.
          Path(".github/workflows/one-shot-release-hardening.yml").unlink()
          PY

      - name: Install build prerequisites
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Validate and update lockfile
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all -- --check
          cargo check -p xai-grok-version
          cargo check -p xai-grok-update
          cargo check -p xai-grok-pager-bin --bin dttn
          cargo check --locked -p xai-grok-version
          grep -F 'version = "0.1.220-alpha.5"' crates/codegen/xai-grok-pager-bin/Cargo.toml
          ! grep -R -n -E 'https://x\.ai/cli|storage\.googleapis\.com/grok-build-public-artifacts|@xai-official/grok|xai-org-shared/grok-build' \
            crates/codegen/xai-grok-update crates/codegen/xai-grok-pager-bin/src/main.rs

      - name: Commit and push
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Cargo.lock \
            .github/workflows/dttn-windows-release.yml \
            .github/workflows/one-shot-release-hardening.yml \
            docs/windows.md \
            crates/codegen/xai-grok-pager-bin/Cargo.toml \
            crates/codegen/xai-grok-pager-bin/src/main.rs \
            crates/codegen/xai-grok-update/src/auto_update.rs \
            crates/codegen/xai-grok-update/src/minimum_version.rs \
            crates/codegen/xai-grok-update/src/version.rs \
            crates/codegen/xai-grok-version/Cargo.toml \
            crates/codegen/xai-grok-version/build.rs \
            crates/codegen/xai-grok-version/src/lib.rs
          git diff --cached --check
          git commit -m 'fix: harden alpha release and disable inherited updater'
          git push origin HEAD:agent/release-hardening-alpha5
