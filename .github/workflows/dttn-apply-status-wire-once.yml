name: DTTN Apply Status Wire Once

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/dttn-apply-status-wire-once.yml'

permissions:
  contents: write

jobs:
  apply-status-wire:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler

      - name: Apply status wire implementation
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/status-wire.patch.gz.b64 <<'PATCH'
          
          PATCH
          base64 --decode /tmp/status-wire.patch.gz.b64 | gunzip > /tmp/status-wire.patch
          git apply --check /tmp/status-wire.patch
          git apply /tmp/status-wire.patch
          rustfmt --edition 2024 --config skip_children=true \
            crates/codegen/xai-grok-shell/src/session/status_runtime_snapshot.rs \
            crates/codegen/xai-grok-shell/src/session/acp_types.rs \
            crates/codegen/xai-grok-shell/src/session/pending_interaction.rs \
            crates/codegen/xai-grok-shell/src/session/acp_session_impl/session_setup.rs \
            crates/codegen/xai-grok-shell/tests/status_runtime_snapshot_contract.rs

      - name: Test status runtime contract
        run: cargo test -p xai-grok-shell --test status_runtime_snapshot_contract

      - name: Test proto build helper
        run: cargo test -p xai-proto-build

      - name: Check production dttn binary
        run: cargo check -p xai-grok-pager-bin --bin dttn

      - name: Validate whitespace
        run: git diff --check

      - name: Commit validated implementation
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            crates/codegen/xai-grok-shell/src/session/status_runtime_snapshot.rs \
            crates/codegen/xai-grok-shell/src/session/acp_types.rs \
            crates/codegen/xai-grok-shell/src/session/pending_interaction.rs \
            crates/codegen/xai-grok-shell/src/session/acp_session_impl/session_setup.rs \
            crates/codegen/xai-grok-shell/tests/status_runtime_snapshot_contract.rs
          git diff --cached --check
          git commit -m 'feat: add status runtime wire snapshots and notifications'
          git push origin "HEAD:${HEAD_BRANCH}"
