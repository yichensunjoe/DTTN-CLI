name: DTTN Recover Pager Status Runtime Once

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/dttn-recover-pager-status-runtime-once.yml'

permissions:
  contents: write

jobs:
  recover-pager-status-runtime:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler

      - name: Recover embedded patch
        shell: bash
        run: |
          set -euo pipefail
          source_file=.github/workflows/dttn-apply-pager-status-runtime-once.yml
          test -f "$source_file"
          python - <<'PY'
          import base64
          import gzip
          from pathlib import Path

          source = Path('.github/workflows/dttn-apply-pager-status-runtime-once.yml').read_text()
          chunks = []
          capture = False
          alphabet = set('ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=')
          for raw in source.splitlines():
              value = raw.strip()
              if not capture and value.startswith('H4sI'):
                  capture = True
              if capture:
                  if value and set(value) <= alphabet:
                      chunks.append(value)
                      continue
                  if chunks:
                      break
          if not chunks:
              raise SystemExit('no gzip base64 payload found')
          encoded = ''.join(chunks)
          patch = gzip.decompress(base64.b64decode(encoded, validate=True))
          Path('/tmp/pager-status-runtime.patch').write_bytes(patch)
          PY
          git apply --check /tmp/pager-status-runtime.patch
          git apply /tmp/pager-status-runtime.patch
          mapfile -t changed_rust < <(git diff --name-only --diff-filter=ACM -- '*.rs')
          if (( ${#changed_rust[@]} > 0 )); then
            rustfmt --edition 2024 --config skip_children=true "${changed_rust[@]}"
          fi
          git diff --check

      - name: Test shell status runtime contract
        run: cargo test -p xai-grok-shell --test status_runtime_snapshot_contract

      - name: Test pager status runtime
        run: cargo test -p xai-grok-pager status_runtime

      - name: Test pager status bar
        run: cargo test -p xai-grok-pager status_bar

      - name: Test proto build helper
        run: cargo test -p xai-proto-build

      - name: Check production dttn binary
        run: cargo check -p xai-grok-pager-bin --bin dttn

      - name: Validate formatting and whitespace
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --check
          git diff --check

      - name: Commit validated product changes
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates Cargo.lock
          git diff --cached --check
          git commit -m 'feat: wire status runtime into pager status bar'
          git push origin "HEAD:${HEAD_BRANCH}"
