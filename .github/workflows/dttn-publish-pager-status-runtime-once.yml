name: DTTN Publish Pager Status Runtime Once

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/dttn-publish-pager-status-runtime-once.yml'

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler

      - name: Download and apply Pager status runtime patch
        id: apply
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            https://rentry.co/dttn-cli-pr9-pager-status-runtime-20260721-a91f7c/raw \
            --output /tmp/dttn-pager-status-runtime.patch
          if git apply --reverse --check /tmp/dttn-pager-status-runtime.patch >/dev/null 2>&1; then
            echo 'already_applied=true' >> "$GITHUB_OUTPUT"
          else
            git apply --check /tmp/dttn-pager-status-runtime.patch
            git apply /tmp/dttn-pager-status-runtime.patch
            echo 'already_applied=false' >> "$GITHUB_OUTPUT"
          fi
          mapfile -t changed_rust < <(git diff --name-only --diff-filter=ACM -- '*.rs')
          if (( ${#changed_rust[@]} > 0 )); then
            rustfmt --edition 2024 --config skip_children=true "${changed_rust[@]}"
          fi
          git diff --check

      - name: Validate formatting
        run: cargo fmt --check

      - name: Test shell status runtime contract
        run: cargo test -p xai-grok-shell --test status_runtime_snapshot_contract

      - name: Test Pager status runtime
        run: cargo test -p xai-grok-pager status_runtime

      - name: Test Pager status bar
        run: cargo test -p xai-grok-pager status_bar

      - name: Test proto build helper
        run: cargo test -p xai-proto-build

      - name: Check production dttn binary
        run: cargo check -p xai-grok-pager-bin --bin dttn

      - name: Validate whitespace
        run: git diff --check

      - name: Commit validated product changes
        if: steps.apply.outputs.already_applied != 'true'
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git reset -- \
            .github/workflows/dttn-apply-pager-status-runtime-once.yml \
            .github/workflows/dttn-cleanup-pager-status-runtime-once.yml \
            .github/workflows/dttn-recover-pager-status-runtime-once.yml \
            .github/workflows/dttn-finalize-pager-status-runtime-once.yml \
            .github/workflows/dttn-verify-pager-status-runtime-once.yml \
            .github/workflows/dttn-publish-pager-status-runtime-once.yml || true
          git diff --cached --check
          test -n "$(git diff --cached --name-only)"
          git commit -m 'feat: wire status runtime into pager status bar'
          git push origin "HEAD:${HEAD_BRANCH}"

      - name: Remove all one-time Pager workflows
        if: always()
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git reset --hard HEAD
          git rm -f --ignore-unmatch \
            .github/workflows/dttn-apply-pager-status-runtime-once.yml \
            .github/workflows/dttn-cleanup-pager-status-runtime-once.yml \
            .github/workflows/dttn-recover-pager-status-runtime-once.yml \
            .github/workflows/dttn-finalize-pager-status-runtime-once.yml \
            .github/workflows/dttn-verify-pager-status-runtime-once.yml \
            .github/workflows/dttn-publish-pager-status-runtime-once.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git diff --cached --check
          git commit -m 'chore: remove pager status runtime staging workflows'
          git push origin "HEAD:${HEAD_BRANCH}"
