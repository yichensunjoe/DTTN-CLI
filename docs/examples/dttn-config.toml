# DTTN-CLI runtime config 示例。
#
# 保存到：
#   macOS / Linux: $DTTN_HOME/config.toml 或 ~/.dttn/config.toml
#   Windows:       $env:DTTN_HOME\config.toml
#
# 启动后运行 `dttn configure` 通过交互式向导添加模型，或使用
# `dttn config models custom ...` 在 CI/脚本中注册模型。

[models]
# 没有内置默认模型——用户必须先配置一个。
web_search = ""
image_description = ""
session_summary = ""
agent_type = "dttn-code-agent"

# 推理请求的全局默认值。模型目录中的每模型配置可覆盖这些值。
temperature = 0.7
top_p = 0.95
max_retries = 3
inference_idle_timeout_secs = 120

[endpoints]
# 未设置时使用每个模型各自的 base_url。
# 设为 example.internal 避免把第三方生产 endpoint 硬编码在配置模板里。
models_base_url = "https://models.example.internal/v1"
models_list_url = "https://models.example.internal/v1/models"

[auth]
# 离线模式：认证钉死在 API-key 方式，永不弹浏览器登录。
preferred_method = "api_key"

[cli]
# Leader 模式可复用长生命周期运行时并支持会话恢复。
use_leader = true

[plugins]
# 企业发行版建议显式管理插件来源，不从项目目录自动信任插件。
paths = []
enabled = []
disabled = []
