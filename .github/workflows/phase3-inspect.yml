name: DTTN Phase 3 Validation

on:
  pull_request:
    branches:
      - refactor/dttn-core-phase-1

permissions:
  contents: read

jobs:
  validate-provider-layer:
    if: github.head_ref == 'refactor/dttn-model-provider-phase-3'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler

      - name: Validate provider compatibility layer
        shell: bash
        run: |
          set -o pipefail
          {
            git fetch origin "${{ github.base_ref }}" --depth=1
            mapfile -t changed_rust < <(
              git diff --name-only --diff-filter=ACM \
                "origin/${{ github.base_ref }}...HEAD" -- '*.rs'
            )
            if (( ${#changed_rust[@]} > 0 )); then
              rustfmt --edition 2024 --check "${changed_rust[@]}"
            fi
            cargo test -p xai-grok-sampling-types
            cargo test -p xai-grok-sampler
            cargo test -p xai-grok-sampler --test provider_extensions
            cargo check -p xai-grok-shell
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          } 2>&1 | tee phase3-validation.log

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dttn-phase3-validation-diagnostics
          path: phase3-validation.log
          if-no-files-found: warn
          retention-days: 7
