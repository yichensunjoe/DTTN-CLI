name: DTTN Phase 6 Status Runtime

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/dttn-phase-6-status-runtime.yml'
      - 'crates/codegen/xai-grok-shell/src/session/**'
      - 'crates/codegen/xai-grok-shell/tests/status_runtime_snapshot_contract.rs'

concurrency:
  group: dttn-phase-6-status-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply-tool-activity-patch:
    name: Apply tool activity integration
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply counted integration patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          status = Path('crates/codegen/xai-grok-shell/src/session/status_runtime_snapshot.rs')
          text = status.read_text()

          old = 'use std::sync::{Arc, RwLock};\n'
          new = 'use std::sync::{Arc, RwLock};\nuse std::time::Instant;\n'
          if 'use std::time::Instant;' not in text:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Instant import marker count={count}, expected 1')
              text = text.replace(old, new)

          publisher_marker = textwrap.dedent('''\
          pub struct StatusRuntimePublisher {
              inner: Arc<StatusRuntimeInner>,
          }

          impl StatusRuntimePublisher {
          ''')
          guard_block = textwrap.dedent('''\
          pub struct StatusRuntimePublisher {
              inner: Arc<StatusRuntimeInner>,
          }

          /// Prompt-owned RAII guard for one concurrently executing tool.
          /// Cancellation and task aborts drop the guard, so active counts cannot
          /// remain stuck. A guard from an older prompt is ignored after a new
          /// prompt owns the snapshot.
          #[must_use]
          pub struct StatusToolGuard {
              publisher: StatusRuntimePublisher,
              prompt_id: Option<String>,
              tool_name: String,
              started_at: Instant,
              finished: bool,
          }

          impl StatusToolGuard {
              pub fn finish(mut self) {
                  self.publish_finished();
                  self.finished = true;
              }

              fn publish_finished(&self) {
                  let Some(prompt_id) = self.prompt_id.as_deref() else {
                      return;
                  };
                  let duration_ms = self.started_at.elapsed().as_millis() as u64;
                  self.publisher.update_if(|snapshot| {
                      if snapshot.active_prompt_id.as_deref() != Some(prompt_id) {
                          return false;
                      }
                      snapshot.tools.active_count = snapshot.tools.active_count.saturating_sub(1);
                      snapshot.tools.last_tool_name = Some(self.tool_name.clone());
                      snapshot.latency.last_tool_ms = Some(duration_ms);
                      true
                  });
              }
          }

          impl Drop for StatusToolGuard {
              fn drop(&mut self) {
                  if !self.finished {
                      self.publish_finished();
                  }
              }
          }

          impl StatusRuntimePublisher {
          ''')
          if 'pub struct StatusToolGuard' not in text:
              count = text.count(publisher_marker)
              if count != 1:
                  raise SystemExit(f'tool guard insertion marker count={count}, expected 1')
              text = text.replace(publisher_marker, guard_block)

          old = '''            snapshot.tools.active_count = 0;
              snapshot.tools.last_tool_name = None;'''
          new = '''            snapshot.tools.active_count = 0;
              snapshot.tools.queued_count = 0;
              snapshot.tools.last_tool_name = None;'''
          if 'snapshot.tools.queued_count = 0;' not in text[text.index('pub fn begin_turn'):text.index('pub fn publish_usage')]:
              count = text.count(old)
              if count < 1:
                  raise SystemExit('begin_turn tool reset marker not found')
              text = text.replace(old, new, 1)

          usage_end = textwrap.dedent('''\
              }

              /// Mark cancellation only when the event still owns the active prompt.
          ''')
          methods = textwrap.dedent('''\
              }

              /// Replace the number of approved tool calls waiting to be polled.
              pub fn queue_tools(&self, count: usize) -> Option<Arc<StatusRuntimeSnapshot>> {
                  let count = u32::try_from(count).unwrap_or(u32::MAX);
                  self.update_if(|snapshot| {
                      if snapshot.active_prompt_id.is_none() || snapshot.tools.queued_count == count {
                          return false;
                      }
                      snapshot.tools.queued_count = count;
                      true
                  })
              }

              /// Start one real dispatch future and return an abort-safe guard.
              pub fn begin_tool(&self, tool_name: impl Into<String>) -> StatusToolGuard {
                  let tool_name = tool_name.into();
                  let mut prompt_id = None;
                  self.update_if(|snapshot| {
                      let Some(active_prompt_id) = snapshot.active_prompt_id.as_ref() else {
                          return false;
                      };
                      prompt_id = Some(active_prompt_id.clone());
                      snapshot.tools.queued_count = snapshot.tools.queued_count.saturating_sub(1);
                      snapshot.tools.active_count = snapshot.tools.active_count.saturating_add(1);
                      snapshot.tools.last_tool_name = Some(tool_name.clone());
                      true
                  });
                  StatusToolGuard {
                      publisher: self.clone(),
                      prompt_id,
                      tool_name,
                      started_at: Instant::now(),
                      finished: false,
                  }
              }

              /// Mark cancellation only when the event still owns the active prompt.
          ''')
          if 'pub fn queue_tools' not in text:
              count = text.count(usage_end)
              if count != 1:
                  raise SystemExit(f'tool methods insertion marker count={count}, expected 1')
              text = text.replace(usage_end, methods)

          cancelling_old = '''            snapshot.run_state = StatusRunState::Cancelling;
              true'''
          cancelling_new = '''            snapshot.run_state = StatusRunState::Cancelling;
              snapshot.tools.queued_count = 0;
              true'''
          if cancelling_new not in text:
              count = text.count(cancelling_old)
              if count != 1:
                  raise SystemExit(f'cancelling reset marker count={count}, expected 1')
              text = text.replace(cancelling_old, cancelling_new)

          finish_old = '''            snapshot.tools.active_count = 0;
              true'''
          finish_new = '''            snapshot.tools.active_count = 0;
              snapshot.tools.queued_count = 0;
              true'''
          if finish_new not in text[text.index('pub fn finish_turn'):]:
              count = text[text.index('pub fn finish_turn'):].count(finish_old)
              if count != 1:
                  raise SystemExit(f'finish reset marker count={count}, expected 1')
              prefix, suffix = text.split('pub fn finish_turn', 1)
              suffix = suffix.replace(finish_old, finish_new, 1)
              text = prefix + 'pub fn finish_turn' + suffix

          test_marker = '''    #[test]
              fn context_percent_is_bounded_and_zero_safe() {'''
          tests = textwrap.dedent('''\
              #[test]
              fn tool_guards_track_parallel_activity_and_latency() {
                  let publisher = StatusRuntimePublisher::new(StatusRuntimeSnapshot::default());
                  publisher.begin_turn("turn-a");
                  assert!(publisher.queue_tools(2).is_some());

                  let first = publisher.begin_tool("bash");
                  let second = publisher.begin_tool("read_file");
                  let active = publisher.snapshot();
                  assert_eq!(active.tools.queued_count, 0);
                  assert_eq!(active.tools.active_count, 2);

                  first.finish();
                  assert_eq!(publisher.snapshot().tools.active_count, 1);
                  drop(second);
                  let done = publisher.snapshot();
                  assert_eq!(done.tools.active_count, 0);
                  assert_eq!(done.tools.last_tool_name.as_deref(), Some("read_file"));
                  assert!(done.latency.last_tool_ms.is_some());
              }

              #[test]
              fn stale_tool_guard_cannot_overwrite_a_new_turn() {
                  let publisher = StatusRuntimePublisher::new(StatusRuntimeSnapshot::default());
                  publisher.begin_turn("turn-a");
                  publisher.queue_tools(1);
                  let stale = publisher.begin_tool("bash");
                  publisher.begin_turn("turn-b");
                  let revision = publisher.snapshot().revision;
                  drop(stale);

                  let current = publisher.snapshot();
                  assert_eq!(current.revision, revision);
                  assert_eq!(current.active_prompt_id.as_deref(), Some("turn-b"));
                  assert_eq!(current.tools.active_count, 0);
                  assert_eq!(current.tools.queued_count, 0);
                  assert_eq!(current.tools.last_tool_name, None);
              }

              #[test]
              fn context_percent_is_bounded_and_zero_safe() {
          ''')
          if 'tool_guards_track_parallel_activity_and_latency' not in text:
              count = text.count(test_marker)
              if count != 1:
                  raise SystemExit(f'tool tests insertion marker count={count}, expected 1')
              text = text.replace(test_marker, tests)

          status.write_text(text)

          tool_calls = Path('crates/codegen/xai-grok-shell/src/session/acp_session_impl/tool_calls.rs')
          text = tool_calls.read_text()

          queue_marker = '''        let session_id: Arc<str> = Arc::from(&*self.session_info.id.0);
              let dispatch_futures: Vec<_> = approved'''
          queue_replacement = '''        let session_id: Arc<str> = Arc::from(&*self.session_info.id.0);
              self.status_runtime.queue_tools(approved.len());
              let dispatch_futures: Vec<_> = approved'''
          if 'self.status_runtime.queue_tools(approved.len());' not in text:
              count = text.count(queue_marker)
              if count != 1:
                  raise SystemExit(f'queue tools marker count={count}, expected 1')
              text = text.replace(queue_marker, queue_replacement)

          clone_marker = '''                let blocking_wait_depth = self.tool_context.blocking_wait_depth.clone();
                      let interruptible ='''
          clone_replacement = '''                let blocking_wait_depth = self.tool_context.blocking_wait_depth.clone();
                      let status_runtime = self.status_runtime.clone();
                      let interruptible ='''
          if 'let status_runtime = self.status_runtime.clone();' not in text:
              count = text.count(clone_marker)
              if count != 1:
                  raise SystemExit(f'status clone marker count={count}, expected 1')
              text = text.replace(clone_marker, clone_replacement)

          future_marker = '''                async move {
                          let exec_start = std::time::Instant::now();'''
          future_replacement = '''                async move {
                          let status_tool = status_runtime.begin_tool(prepared.tool_name.clone());
                          let exec_start = std::time::Instant::now();'''
          if 'let status_tool = status_runtime.begin_tool' not in text:
              count = text.count(future_marker)
              if count != 1:
                  raise SystemExit(f'tool guard start marker count={count}, expected 1')
              text = text.replace(future_marker, future_replacement)

          log_marker = '''                    xai_grok_telemetry::unified_log::info(
                              "shell.tool.exec_done",'''
          log_replacement = '''                    let execution_duration_ms = exec_start.elapsed().as_millis() as u64;
                          status_tool.finish();
                          xai_grok_telemetry::unified_log::info(
                              "shell.tool.exec_done",'''
          if 'let execution_duration_ms = exec_start.elapsed()' not in text:
              count = text.count(log_marker)
              if count != 1:
                  raise SystemExit(f'tool finish marker count={count}, expected 1')
              text = text.replace(log_marker, log_replacement)

          elapsed_old = '''"tool_name" : prepared.tool_name.as_str(), "elapsed_ms" :
                              exec_start.elapsed().as_millis() as u64, "success" :'''
          elapsed_new = '''"tool_name" : prepared.tool_name.as_str(), "elapsed_ms" :
                              execution_duration_ms, "success" :'''
          if elapsed_new not in text:
              count = text.count(elapsed_old)
              if count != 1:
                  raise SystemExit(f'tool elapsed replacement count={count}, expected 1')
              text = text.replace(elapsed_old, elapsed_new)

          tool_calls.write_text(text)
          PY

          rustfmt --edition 2024 --config skip_children=true \
            crates/codegen/xai-grok-shell/src/session/status_runtime_snapshot.rs \
            crates/codegen/xai-grok-shell/src/session/acp_session_impl/tool_calls.rs \
            crates/codegen/xai-grok-shell/tests/status_runtime_snapshot_contract.rs
          git diff --check

      - name: Commit integration files
        shell: bash
        run: |
          if git diff --quiet -- \
            crates/codegen/xai-grok-shell/src/session/status_runtime_snapshot.rs \
            crates/codegen/xai-grok-shell/src/session/acp_session_impl/tool_calls.rs \
            crates/codegen/xai-grok-shell/tests/status_runtime_snapshot_contract.rs; then
            echo 'Tool activity integration already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            crates/codegen/xai-grok-shell/src/session/status_runtime_snapshot.rs \
            crates/codegen/xai-grok-shell/src/session/acp_session_impl/tool_calls.rs \
            crates/codegen/xai-grok-shell/tests/status_runtime_snapshot_contract.rs
          git commit -m 'feat: publish prompt-owned tool activity'
          git push origin HEAD:${{ github.head_ref }}
