name: DTTN Publish Pager Status Runtime Once

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/dttn-publish-pager-status-runtime-once.yml'

concurrency:
  group: dttn-publish-pager-status-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler

      - name: Restore immutable Pager patch blob
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PATCH_BLOB_SHA: d35659cf59ade3f59bc094eef1b7af885ed4f784
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/git/blobs/${PATCH_BLOB_SHA}" --jq .content \
            | tr -d '\n' \
            | base64 --decode > /tmp/dttn-pager-status-runtime.patch.gz
          gunzip --stdout /tmp/dttn-pager-status-runtime.patch.gz \
            > /tmp/dttn-pager-status-runtime.patch
          echo '17bc10fe063166fd53d6c0556dad0b929dc7acee774a8424d7f8c1b820ac4c57  /tmp/dttn-pager-status-runtime.patch' \
            | sha256sum --check --strict

      - name: Apply and format Pager implementation
        id: apply
        shell: bash
        run: |
          set -euo pipefail
          if git apply --reverse --check /tmp/dttn-pager-status-runtime.patch >/dev/null 2>&1; then
            echo 'already_applied=true' >> "$GITHUB_OUTPUT"
          else
            git apply --check /tmp/dttn-pager-status-runtime.patch
            git apply /tmp/dttn-pager-status-runtime.patch
            echo 'already_applied=false' >> "$GITHUB_OUTPUT"
          fi
          mapfile -t changed_rust < <(git diff --name-only --diff-filter=ACM -- '*.rs')
          if (( ${#changed_rust[@]} > 0 )); then
            rustfmt --edition 2024 --config skip_children=true "${changed_rust[@]}"
          fi
          git diff --check

      - name: Validate changed Rust formatting
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t changed_rust < <(git diff --name-only --diff-filter=ACM -- '*.rs')
          if (( ${#changed_rust[@]} > 0 )); then
            rustfmt --edition 2024 --config skip_children=true --check "${changed_rust[@]}"
          fi

      - name: Validate Pager status runtime
        id: validation
        continue-on-error: true
        shell: bash
        env:
          CARGO_TERM_COLOR: never
        run: |
          set +e
          (
            set -euo pipefail
            cargo test -p xai-grok-shell --test status_runtime_snapshot_contract
            cargo test -p xai-grok-pager --test status_runtime_contract
            cargo check -p xai-grok-pager
            cargo test -p xai-proto-build
            cargo check -p xai-grok-pager-bin --bin dttn
            git diff --check
          ) > pager-status-runtime-validation.log 2>&1
          status=$?
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          tail -n 500 pager-status-runtime-validation.log
          exit 0

      - name: Upload failure diagnostics
        if: steps.validation.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: pager-status-runtime-validation-log
          path: pager-status-runtime-validation.log
          if-no-files-found: error

      - name: Enforce validation result
        if: steps.validation.outputs.status != '0'
        run: exit 1

      - name: Commit validated product changes
        if: steps.apply.outputs.already_applied != 'true' && steps.validation.outputs.status == '0'
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            .github/workflows/dttn-phase-6-status-runtime.yml \
            crates/codegen/xai-grok-pager/src/views/status_runtime.rs \
            crates/codegen/xai-grok-pager/src/views/mod.rs \
            crates/codegen/xai-grok-pager/src/app/actions.rs \
            crates/codegen/xai-grok-pager/src/app/agent_view/mod.rs \
            crates/codegen/xai-grok-pager/src/app/agent_view/session.rs \
            crates/codegen/xai-grok-pager/src/app/agent_view/render.rs \
            crates/codegen/xai-grok-pager/src/app/acp_handler/mod.rs \
            crates/codegen/xai-grok-pager/src/app/acp_handler/tests/mod.rs \
            crates/codegen/xai-grok-pager/src/app/acp_handler/tests/status_runtime.rs \
            crates/codegen/xai-grok-pager/src/app/effects/mod.rs \
            crates/codegen/xai-grok-pager/src/app/effects/tests.rs \
            crates/codegen/xai-grok-pager/src/app/dispatch/status.rs \
            crates/codegen/xai-grok-pager/src/app/dispatch/task_result.rs \
            crates/codegen/xai-grok-pager/src/app/dispatch/tests/task_result.rs \
            crates/codegen/xai-grok-pager/tests/status_runtime_contract.rs
          git diff --cached --check
          test -n "$(git diff --cached --name-only)"
          git commit -m 'feat: connect Pager status runtime and status line'
          git push origin "HEAD:${HEAD_BRANCH}"

      - name: Remove one-time workflow
        if: always()
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git fetch origin "$HEAD_BRANCH"
          git reset --hard "origin/$HEAD_BRANCH"
          git rm -f --ignore-unmatch .github/workflows/dttn-publish-pager-status-runtime-once.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git diff --cached --check
          git commit -m 'chore: remove Pager status runtime publisher'
          git push origin "HEAD:${HEAD_BRANCH}"
