name: Apply release hardening on PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply release hardening patch
        id: patch
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f .release-hardening-validated ]]; then
            echo 'prevalidated=true' >> "$GITHUB_OUTPUT"
          else
            echo 'prevalidated=false' >> "$GITHUB_OUTPUT"
          fi
          python3 scripts/apply-release-hardening.py

      - name: Install build prerequisites
        if: steps.patch.outputs.prevalidated != 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Validate and update lockfile
        if: steps.patch.outputs.prevalidated != 'true'
        id: validate
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            cargo fmt \
              -p xai-grok-version \
              -p xai-grok-update \
              -p xai-grok-pager-bin
            cargo fmt \
              -p xai-grok-version \
              -p xai-grok-update \
              -p xai-grok-pager-bin \
              -- --check
            cargo check -p xai-grok-version
            cargo check -p xai-grok-update
            cargo check -p xai-grok-pager-bin --bin dttn
            cargo check --locked -p xai-grok-version
            grep -F 'version = "0.1.220-alpha.5"' crates/codegen/xai-grok-pager-bin/Cargo.toml
            ! grep -R -n -E 'https://x\.ai/cli|storage\.googleapis\.com/grok-build-public-artifacts|@xai-official/grok|xai-org-shared/grok-build' \
              crates/codegen/xai-grok-update/src crates/codegen/xai-grok-pager-bin/src/main.rs
          ) 2>&1 | tee .release-hardening-validation.log
          status=${PIPESTATUS[0]}
          if [[ $status -eq 0 ]]; then
            echo 'ok=true' >> "$GITHUB_OUTPUT"
            rm -f .release-hardening-validation.log
          else
            echo 'ok=false' >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Persist validation failure
        if: steps.patch.outputs.prevalidated != 'true' && steps.validate.outputs.ok == 'false'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .release-hardening-validation.log
          git commit -m 'ci: capture release hardening validation failure'
          git push origin HEAD:${{ github.head_ref }}
          cat .release-hardening-validation.log
          exit 1

      - name: Commit validated code and generated workflow candidate
        if: steps.patch.outputs.prevalidated == 'true' || steps.validate.outputs.ok == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cp .github/workflows/dttn-windows-release.yml release-workflow.generated.yml
          git checkout HEAD -- .github/workflows
          rm -f .release-hardening-validated

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'fix: harden alpha release and disable inherited updater'
          git push origin HEAD:${{ github.head_ref }}
